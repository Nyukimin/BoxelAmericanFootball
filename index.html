    if (renderer.domElement && renderer.domElement.addEventListener) {
      renderer.domElement.addEventListener("pointerdown", onPointerDown);
    }

    var hemi = THREE.HemisphereLight
      ? new THREE.HemisphereLight(0xbfe3f2, 0x3f8f45, 0.62)
      : new THREE.AmbientLight(0xffffff, 0.62);
    scene.add(hemi);
    var sun = new THREE.DirectionalLight(0xffffff, 0.68);
    sun.position.set(-45, 50, 20);
    sun.castShadow = true;
    if (!sun.shadow) sun.shadow = {};
    if (!sun.shadow.mapSize) sun.shadow.mapSize = {};
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    if (!sun.shadow.camera) sun.shadow.camera = {};
    sun.shadow.camera.left = -90;
    sun.shadow.camera.right = 90;
    sun.shadow.camera.top = 90;
    sun.shadow.camera.bottom = -90;
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 250;
    if (sun.shadow.camera.updateProjectionMatrix) sun.shadow.camera.updateProjectionMatrix();
    sun.shadow.bias = -0.0005;
    scene.add(sun);
    scene.add(prepModel(field()));
    firstDownLine = prepModel(makeFirstDownMarker()); scene.add(firstDownLine);

    // 4ユニット(計44体)を生成してすべて scene に追加
    BC.OFFENSE.forEach(function (c) { var a = prepModel(BC.makePlayer(c, BC.TEAM.home)); homeOff.push(a); scene.add(a); });
    BC.DEFENSE.forEach(function (c) { var b = prepModel(BC.makePlayer(c, BC.TEAM.away)); awayDef.push(b); scene.add(b); });
    BC.HOME_DEFENSE.forEach(function (c) { var b = prepModel(BC.makePlayer(c, BC.TEAM.home)); homeDef.push(b); scene.add(b); });
    BC.AWAY_OFFENSE.forEach(function (c) { var a = prepModel(BC.makePlayer(c, BC.TEAM.away)); awayOff.push(a); scene.add(a); });
    BC.HOME_SPECIAL.forEach(function (c) { var a = prepModel(BC.makePlayer(c, BC.TEAM.home)); homeSpec.push(a); scene.add(a); });
    BC.AWAY_SPECIAL.forEach(function (c) { var b = prepModel(BC.makePlayer(c, BC.TEAM.away)); awaySpec.push(b); scene.add(b); });
    // 初期は攻撃フェーズ（homeOff/awayDef をオンフィールドに。特殊ユニットは非表示）
    setActiveUnits("offense");

    ball = prepModel(makeBall()); scene.add(ball);
    ballMarker = prepModel(makeMarker()); scene.add(ballMarker);
    manager = prepModel(BC.makeManager(BC.MANAGER)); manager.position.set(-32, 0, 56); scene.add(manager);

    var tg = new THREE.BufferGeometry();
    tg.setAttribute("position", new THREE.BufferAttribute(new Float32Array(50 * 3), 3));
    trail = new THREE.Line(tg, new THREE.LineBasicMaterial({ color: 0xffe14d, transparent: true, opacity: 0.35 }));
    scene.add(prepModel(trail));
    prepModel(scene);
    scene.add(makeStadiumEnvironment());
    scene.add(makeVoxelClouds());

    placeFormation("single");
    camPos.set(30, 38, state.los - 32); camTarget.set(0, 0, state.los);

    document.querySelectorAll("#views button").forEach(function (b) {
      b.onclick = function () { setView(b.getAttribute("data-v")); };
    });
    window.addEventListener("resize", function () {
      camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    clock = new THREE.Clock();
    updateHUD();
    animate();
  }

  function animate() {
    requestAnimationFrame(animate);
    var dt = Math.min(0.05, clock.getDelta());
    passFlightActive = false;
    var ballPrev = ball.position.clone();
    updateAnim(dt);
    updateDefenseAnim(dt);
    updateFGKick(dt);
    updateFGMeter(dt);
    updateUnitTransition(dt);
    updateVoxelClouds(dt);
    updateConfetti(dt);
    updateGoalPostPulse(dt);
    ballMarker.position.set(ball.position.x, 0, ball.position.z);
    var t = clock.elapsedTime;
    var pulse = (Math.sin(t * 4) + 1) * 0.5;
    var ringScale = 1 + pulse * 0.25;
    if (ballMarker.userData.ring.scale.setScalar) ballMarker.userData.ring.scale.setScalar(ringScale);
    else if (ballMarker.userData.ring.scale.set) ballMarker.userData.ring.scale.set(ringScale, ringScale, ringScale);
    else ballMarker.userData.ring.scale.x = ballMarker.userData.ring.scale.y = ballMarker.userData.ring.scale.z = ringScale;
    ballMarker.userData.ring.material.opacity = 0.55 + pulse * 0.25;
    ballMarker.userData.arrow.position.y = ball.position.y + 2.5 + Math.sin(t * 4) * 0.2;
    ball.rotation.z += dt * 4;
    if (passFlightActive) {
      var flightDir = ball.position.clone().sub(ballPrev);
      if (flightDir.lengthSq() > 0.0001) {
        passSpiralSpin += dt * 34;
        flightDir.normalize();
        ball.quaternion.setFromUnitVectors(new THREE.Vector3(1, 0, 0), flightDir);
        ball.rotateX(passSpiralSpin);
      } else {
        ball.rotation.x += dt * 34;
      }
    }
    if (trail && trail.material) trail.material.opacity = passFlightActive ? 0.9 : 0.35;
    if (!anim && !defAnim && !fgKick && !unitTransition) poseIdleUnits(t);
    if (manager) {
      var mdx = ball.position.x - manager.position.x, mdz = ball.position.z - manager.position.z;
      var targetYaw = Math.atan2(mdx, mdz);
      manager.rotation.y += (targetYaw - manager.rotation.y) * Math.min(1, dt * 4);
      manager.userData.rec.visible = Math.sin(t * 5) > 0;
      manager.position.y = Math.abs(Math.sin(t * 2)) * 0.05;
    }
    updateTrail();
    updateCamera(dt);
    renderer.render(scene, camera);
  }

  function renderHelpTopic() {
    var topic = activeHelpTopics[helpIndex] || activeHelpTopics[0];
    var img = document.getElementById("helpImage");
    var title = document.getElementById("helpTitle");
    var caption = document.getElementById("helpCaption");
    var page = document.getElementById("helpPage");
    var prev = document.getElementById("helpPrev");
    var next = document.getElementById("helpNext");
    if (!topic || !img || !title || !caption || !page || !prev || !next) return;

    img.onerror = function () {
      img.onerror = null;
      img.src = PLACEHOLDER_IMG;
    };
    img.src = topic.img;
    img.alt = topic.title;
    title.textContent = topic.title;
    caption.innerHTML = topic.caption;
    page.textContent = (helpIndex + 1) + " / " + activeHelpTopics.length;
    prev.disabled = helpIndex === 0;
    next.disabled = helpIndex >= activeHelpTopics.length - 1;
  }

  function openHelp(topics) {
    activeHelpTopics = topics || HELP_TOPICS;
    helpIndex = 0;
    renderHelpTopic();
    document.getElementById("help").style.display = "block";
  }

  function closeHelp() {
    document.getElementById("help").style.display = "none";
  }

  function moveHelp(delta) {
    var nextIndex = helpIndex + delta;
    if (nextIndex < 0 || nextIndex >= activeHelpTopics.length) return;
    helpIndex = nextIndex;
    renderHelpTopic();
  }

  // ヘルプ／教材ページの開閉
  document.getElementById("helpBtn").onclick = function () { openHelp(HELP_TOPICS); };
  var _guideBtn = document.getElementById("guideBtn");
  if (_guideBtn) _guideBtn.onclick = function () { openHelp(GUIDE_TOPICS); };
  document.getElementById("helpPrev").onclick = function () { moveHelp(-1); };
  document.getElementById("helpNext").onclick = function () { moveHelp(1); };
  document.getElementById("helpClose").onclick = closeHelp;
  window.addEventListener("keydown", function (e) {
    var help = document.getElementById("help");
    if (!help || help.style.display !== "block") return;
    if (renderer && e.target === renderer.domElement) return;
    if (e.key === "ArrowLeft") {
      moveHelp(-1);
      e.preventDefault();
    } else if (e.key === "ArrowRight") {
      moveHelp(1);
      e.preventDefault();
    } else if (e.key === "Escape") {
      closeHelp();
      e.preventDefault();
    }
  });

  (function () {

      autoAdvanceOn = !autoAdvanceOn;
      saveAutoAdvanceSetting(autoAdvanceOn);

      var tap = document.getElementById("tapNext");
      if (autoAdvanceOn) {
        if (tap && tap.style.display === "block" && currentContinueGo) startAutoContinue(tap, currentContinueGo);
      } else {
        stopAutoContinue();
        if (tap && tap.style.display === "block") tap.textContent = "▶ タップで次へ";
      }
    };
  })();

  // タイムアウトボタン（攻撃/守備どちらの局面でも使用可）
  (function () {
    var toBtn = document.getElementById("timeoutBtn");
    if (toBtn) toBtn.onclick = useTimeout;
  })();

  // 選手情報パネルはタップで閉じる（レイキャスト本体は init 内で renderer 準備後に配線）
  (function () {
    var pinfo = document.getElementById("playerInfo");
    if (pinfo) pinfo.onclick = hidePlayerInfo;
  })();

  function sleepDemo(ms) {
    return new Promise(function (r) { demoTimer = setTimeout(r, ms); });
  }

  async function demoLoop() {
    var myGen = demoGen;
    animTurbo = NORMAL_TEMPO;
    while (demoRunning && myGen === demoGen) {
      var seed = (Math.floor(Math.random() * 1e9)) >>> 0;
      enableReplay(seed);
      resetGame();
      var steps = 0;
      while (demoRunning && myGen === demoGen && !state.gameEnded && steps < 6000) {
        var tap = document.getElementById("tapNext");
        if (tap && tap.style.display === "block") {
          await sleepDemo(2600);
          if (!demoRunning || myGen !== demoGen) break;
          if (tap.onclick) { try { tap.onclick(); } catch (e) {} }
          steps++;
          continue;
        }
        var cs = document.getElementById("cards").children;
        if (cs.length > 0) {
          await sleepDemo(2100);
          if (!demoRunning || myGen !== demoGen) break;
          var i = Math.floor(Math.random() * cs.length) % cs.length;
          var card = cs[i];
          if (card && card.onclick) { try { card.onclick(); } catch (e) {} }
          steps++;
          continue;
        }
        await sleepDemo(90);
        steps++;
      }
      if (!demoRunning || myGen !== demoGen) break;
      await sleepDemo(2600);
    }
  }

  function startDemo() {
    if (demoRunning) return;
    demoRunning = true;
    demoGen++;
    if (document.body) document.body.classList.add("demo-active");
    var start = document.getElementById("start");
    if (start) start.classList.add("demo");
    demoLoop();
  }

  function stopDemo() {
    demoRunning = false;
    demoGen++;
    if (demoTimer) { clearTimeout(demoTimer); demoTimer = null; }
    if (typeof stopAutoContinue === "function") stopAutoContinue();
    if (continueTimer) { clearTimeout(continueTimer); continueTimer = null; }
    disableReplay();
    animTurbo = NORMAL_TEMPO;
    if (document.body) document.body.classList.remove("demo-active");
    var start = document.getElementById("start");
    if (start) start.classList.remove("demo");
  }

  // ===== 自動プレー（実ブラウザで N 試合をランダムにプレーし、ログをファイルへ保存）=====
  // 一部環境(Apple Silicon)で Playwright/Chromium が起動時にクラッシュするため、外部自動操作に
  // 頼らず「ページ自身」が自動プレーする。URL に ?autoplay=10 を付けて開くか autoPlay(10) を呼ぶ。
  // 各試合は seed=1..N の再現モードで実行（後から同seedで再現可能）。アニメは turbo で短縮（結果は不変）。
  // 完了時に baf_autoplay.json（全試合の sysLog＋状態＋例外）をダウンロードする。
  function autoPlay(nGames, opts) {
    opts = opts || {};
    nGames = nGames || 10;
    var turbo = opts.turbo || 0.08;
    var maxSteps = opts.maxSteps || 8000;
    var postUrl = opts.postUrl || null;   // 指定時は結果をサーバへPOST（ローカルサーバ自動化用）
    var cur = 0;
    var out = { games: nGames, turbo: turbo, ua: (typeof navigator !== "undefined" ? navigator.userAgent : ""), errors: [], results: [] };
    window.__AUTOPLAY = out;
    var prevOnerror = (typeof window !== "undefined") ? window.onerror : null;
    if (typeof window !== "undefined") {
      window.onerror = function (m, src, ln, col) { out.errors.push({ game: cur, msg: String(m), ln: ln || 0 }); return false; };
    }
    var $ = function (id) { return document.getElementById(id); };
    function sleep(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }
    // 試合ごとに独立な決定論ドライバRNG（操作選択用。ゲーム本体の gameRng とは別系列）
    function driverRng(seed) { return mulberry32((Math.imul(seed, 2654435761) ^ 0x9e3779b9) >>> 0); }

    async function playGame(seed) {
      cur = seed;
      enableReplay(seed);
      $("start").style.display = "none";
      resetGame();
      var drv = driverRng(seed);
      var steps = 0, errBefore = out.errors.length, stuck = 0;
      var lastClock = null, lastQ = null;
      var anomalies = [];
      while (steps < maxSteps) {
        if (state.gameEnded) break;
        // 軽い不変条件チェック（詳細は sysLog 側で解析）
        if (state.mode === "offense" && state.down && !(state.down >= 1 && state.down <= 4)) {
          anomalies.push("down範囲外 down=" + state.down + " q=" + state.quarter);
        }
        if (lastQ !== null && state.quarter === lastQ && lastClock !== null && state.clock > lastClock + 1.0) {
          anomalies.push("clock増加 " + Math.round(lastClock) + "->" + Math.round(state.clock) + " Q" + state.quarter);
        }
        lastQ = state.quarter; lastClock = state.clock;

        var tap = $("tapNext");
        if (tap && tap.style.display === "block") {
          if (tap.onclick) { try { tap.onclick(); } catch (e) { out.errors.push({ game: seed, msg: "tap " + e.message }); } }
          await sleep(6); steps++; stuck = 0; continue;
        }
        var cs = $("cards").children;
        if (cs.length > 0) {
          var i = Math.floor(drv() * cs.length) % cs.length;
          var card = cs[i];
          if (card && card.onclick) { try { card.onclick(); } catch (e) { out.errors.push({ game: seed, msg: "card " + e.message }); } }
          await sleep(14); steps++; stuck = 0; continue;
        }
        // カードもタップも無い＝アニメ中。少し待つ。
        await sleep(16); steps++; stuck++;
        if (stuck > 1500) { out.errors.push({ game: seed, msg: "stuck(進行不能)" }); break; }
      }
      var sj = null;
      try { sj = JSON.parse(sysLogJSON()); } catch (e) { out.errors.push({ game: seed, msg: "sysLogParse " + e.message }); }
      return {
        seed: seed, steps: steps, ended: !!state.gameEnded,
        home: state.home, away: state.away, quarter: state.quarter,
        anomalies: anomalies.slice(0, 10),
        newErrors: out.errors.length - errBefore,
        sysLog: sj
      };
    }

    (async function () {
      animTurbo = turbo;
      for (var s = 1; s <= nGames; s++) {
        setBubble("自動プレー中… " + s + "/" + nGames + " 試合");
        try { out.results.push(await playGame(s)); }
        catch (e) {
          out.results.push({ seed: s, ended: false, fatal: String((e && e.message) || e) });
          out.errors.push({ game: s, msg: "fatal " + e });
        }
        await sleep(10);
      }
      animTurbo = 1;
      if (typeof window !== "undefined") window.onerror = prevOnerror;
      var ng = out.results.filter(function (r) { return !r.ended || r.fatal || (r.newErrors || 0) > 0 || (r.anomalies && r.anomalies.length); }).length;
      out.summary = { ng: ng, total: nGames, errors: out.errors.length };
      var json = JSON.stringify(out);
      var saved = false;
      // 1) ローカルサーバ自動化: postUrl があればサーバへPOST（同一オリジン＝CORS不要）。
      if (postUrl) {
        try {
          var res = await fetch(postUrl, { method: "POST", headers: { "Content-Type": "application/json" }, body: json });
          saved = !!(res && res.ok);
        } catch (e) {
          // sendBeacon フォールバック（ページ閉鎖耐性）
          try { saved = (typeof navigator !== "undefined" && navigator.sendBeacon) ? navigator.sendBeacon(postUrl, json) : false; } catch (e2) { saved = false; }
        }
      }
      // 2) POSTできない（file://直開き等）場合はダウンロード保存にフォールバック。
      if (!saved) {
        try {
          var blob = new Blob([json], { type: "application/json" });
          var a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "baf_autoplay.json";
          document.body.appendChild(a); a.click();
          setTimeout(function () { try { document.body.removeChild(a); } catch (e) {} }, 1500);
        } catch (e) { out.errors.push({ game: 0, msg: "download " + e.message }); }
      }
      setBubble("自動" + nGames + "試合 完了。NG=" + ng + " / 例外=" + out.errors.length +
        "。" + (saved ? "サーバへ送信しました（このタブは閉じてOK）。" : "<b>baf_autoplay.json</b> を保存しました（ダウンロードフォルダ）。"));
      if (typeof console !== "undefined" && console.log) console.log("[AUTOPLAY DONE]", out.summary, out);
    })();
    return "autoplay started: " + nGames + " games";
  }

  // テスト用: offense/defense/carrier/anim を window.__BoxelTest に公開
  window.__BoxelTest = {
    getOffense: function () { return offense; },
    getDefense: function () { return defense; },
    getCarrier: function () { return carrier; },
    getAnim: function () { return anim; },
    getState: function () { return state; },
    getSysLog: function () { return sysLog; },
    getPlayLog: function () { return playLog; },
    sysLogJSON: function () { return sysLogJSON(); },
    enableReplay: function (seed) { enableReplay(seed); },
    disableReplay: function () { disableReplay(); },
    isGameOver: function () { return !!state.gameEnded; },
    setTurbo: function (f) { animTurbo = (f > 0) ? f : 1; },
    autoPlay: function (n, opts) { return autoPlay(n, opts); },
    testFG: function (los) {
      // FGミニゲームを直接起動する（デバッグ用）。los 省略時は 80（40ヤードFG相当）
      var _los = (los != null) ? los : 80;
      document.getElementById("start").style.display = "none";
      state.quarter = 1; state.clock = QUARTER_LENGTH; state.down = 4; state.los = _los;
      state.toGo = 10; state.home = 0; state.away = 0; state.gameEnded = false;
      state.mode = "offense"; state.phase = "formation";
      setActiveUnits("offense"); placeFormation("balanced");
      kickPlay("fg");
    }
  };

  init();
  // URL に ?autoplay=N があれば自動プレーを開始（実ブラウザのみ。ヘッドレスは location 無しでスキップ）。
  try {
    if (typeof location !== "undefined" && location.search) {
      var _q = new URLSearchParams(location.search);
      var _ap = _q.get("autoplay");
      if (_ap != null) autoPlay(parseInt(_ap, 10) || 10, { postUrl: _q.get("post") });
    }
  } catch (e) { if (typeof console !== "undefined") console.warn("autoplay trigger skipped", e); }
  try {
    if (typeof location !== "undefined") {
      var _demoQ = new URLSearchParams(location.search);
      if (_demoQ.get("autoplay") == null) startDemo();
    }
  } catch (e) { if (typeof console !== "undefined") console.warn("demo start skipped", e); }
})();
</script>
</body>
</html>
