  function placeFormation(formation) {
    var los = state.los;
    // 全選手リセット
    for (var i = 0; i < offense.length; i++) { offense[i].position.set(0, 0, los); offense[i].rotation.set(0, 0, 0); BC.poseReset(offense[i]); }

    // ロール別グループを収集
    var ols = [], tes = [], wrs = [], rbs = [];
    for (var i = 0; i < offense.length; i++) {
      var r = offense[i].userData.role;
      if (r === "OL") ols.push(offense[i]);
      else if (r === "TE") tes.push(offense[i]);
      else if (r === "WR") wrs.push(offense[i]);
      else if (r === "RB") rbs.push(offense[i]);
    }

    // OL(5体)配置: 隣接2.0間隔で重ならないように
    var olX = [-4, -2, 0, 2, 4];
    for (var i = 0; i < ols.length; i++) { ols[i].position.set(olX[i] || 0, 0, los); }

    // TE配置: OLタックル(±4)の外側 ±6
    if (tes.length > 0) tes[0].position.set(6, 0, los);
    if (tes.length > 1) tes[1].position.set(-6, 0, los);

    // WR配置: ワイド/スロットに分散
    var wrX = [-13, 13, 9, -9];
    for (var i = 0; i < wrs.length; i++) { wrs[i].position.set(wrX[i] || 0, 0, los); }

    // RB配置: 1人目バックフィールド、2人目(FB)前
    if (rbs.length > 0) rbs[0].position.set(0, 0, los - 5);
    if (rbs.length > 1) rbs[1].position.set(0, 0, los - 3);

    // グローバル参照を更新
    qb = byRole("QB") || offense[0];
    rb = byRole("RB") || offense[1];
    wr = byRole("WR") || offense[2];

    // formation 別 QB 配置
    if (formation === "shotgun") {
      qb.position.set(0, 0, los - 5);
      // slot WR: 2番目以降で |x| が最小のものを中央寄りに
      if (wrs.length > 1) {
        var slotWr = wrs[1];
        for (var i = 2; i < wrs.length; i++) {
          if (Math.abs(wrs[i].position.x) < Math.abs(slotWr.position.x)) slotWr = wrs[i];
        }
        slotWr.position.set(8, 0, los);
      }
    } else if (formation === "i") {
      qb.position.set(0, 0, los - 1);
      if (rbs.length > 0) rbs[0].position.set(0, 0, los - 5);
    } else if (formation === "single") {
      qb.position.set(0, 0, los - 1.5);
      if (rbs.length > 0) rbs[0].position.set(0, 0, los - 5);
    } else if (formation === "goal") {
      // ゴールライン: ライン(OL/TE)はそのまま、WR を内側へ寄せて密集（重ならない位置に）
      var gWrX = [-8, 8, -10, 10];
      for (var i = 0; i < wrs.length; i++) { wrs[i].position.set(gWrX[i] || (i % 2 ? 12 : -12), 0, los); }
      qb.position.set(0, 0, los - 1.5);
      if (rbs.length > 0) rbs[0].position.set(0, 0, los - 3);
    }

    // 守備(11体)をロール別に整列
    var dlX = [-3.5, -1.2, 1.2, 3.5];
    var lbX = [-5, 0, 5];
    var cbX = [-13, 13];
    var sX  = [-6, 6];
    var dlIdx = 0, lbIdx = 0, cbIdx = 0, sIdx = 0;
    for (var d = 0; d < defense.length; d++) {
      var dr = defense[d].userData.role;
      defense[d].position.y = 0;
      defense[d].rotation.set(0, Math.PI, 0);
      BC.poseReset(defense[d]);
      if (dr === "DL") { defense[d].position.set(dlX[dlIdx] || 0, 0, los + 1.6);  dlIdx++; }
      else if (dr === "LB") { defense[d].position.set(lbX[lbIdx] || 0, 0, los + 5);  lbIdx++; }
      else if (dr === "CB") { defense[d].position.set(cbX[cbIdx] || 0, 0, los + 2); cbIdx++; }
      else if (dr === "S")  { defense[d].position.set(sX[sIdx]   || 0, 0, los + 12); sIdx++; }
      else { defense[d].position.set(0, 0, los + 4); }
    }

    applyHashShift(offense);
    applyHashShift(defense);
    setBall(qb.position.x, qb.position.z);
  }

  // ハッシュ（state.hashX）に応じて全選手の横位置をずらし、フィールド幅内にクランプする。
  // ハッシュによりボールの左右位置が再現される（中央=0 / 左=-6 / 右=+6 が基本）。
  function applyHashShift(list) {
    if (!state.hashX) return;
    for (var i = 0; i < list.length; i++) {
      var nx = list[i].position.x + state.hashX;
      list[i].position.x = Math.max(-FIELD_HALF_W, Math.min(FIELD_HALF_W, nx));
    }
  }

  function setBall(x, z, y) { ball.position.set(x, y == null ? 1.4 : y, z); }

  function setCarriedBall(p, yOffset) {
    var yaw = (p.rotation && p.rotation.y) || 0;
    var side = 0.42;
    var forward = 0.06;
    var x = p.position.x + Math.cos(yaw) * side + Math.sin(yaw) * forward;
    var z = p.position.z - Math.sin(yaw) * side + Math.cos(yaw) * forward;
    setBall(x, z, p.position.y + (yOffset == null ? 1.0 : yOffset));
  }

  function poseRunLean(p, phase) {
    BC.poseRun(p, phase);
    p.rotation.x = 0.1;
  }

  function poseIdleUnits(t) {
    offense.forEach(function (p) { BC.poseIdle(p, t); });
    defense.forEach(function (p) { BC.poseIdle(p, t); });
  }

  function finishUnitTransition(restoreFormation) {
    if (!unitTransition) return;
    var tr = unitTransition;
    tr.entries.forEach(function (e) {
      if (e.kind === "out") e.p.visible = false;
      e.p.position.y = 0;
      e.p.rotation.x = 0;
      e.p.rotation.z = 0;
      BC.poseReset(e.p);
    });
    unitTransition = null;
    if (!restoreFormation) return;
    if (tr.toMode === "offense" && state.mode === "offense") placeFormation(state.formation || "single");
    else if (tr.toMode === "defense" && state.mode === "defense") placeOppFormation();
  }

  function updateUnitTransition(dt) {
    if (!unitTransition) return;
    if (state.phase !== "formation") { finishUnitTransition(false); return; }
    unitTransition.t += dt;
    var tr = unitTransition;
    for (var i = 0; i < tr.entries.length; i++) {
      var e = tr.entries[i];
      var localDur = e.kind === "out" ? 0.7 * animTurbo : 0.8 * animTurbo;
      var p = Math.max(0, Math.min(1, (tr.t - e.delay * animTurbo) / localDur));
      if (p <= 0) continue;
      var q = easeInOutQuad(p);
      e.p.position.x = lerp(e.x0, e.x1, q);
      e.p.position.z = lerp(e.z0, e.z1, q);
      e.p.position.y = Math.abs(Math.sin(p * Math.PI * 4)) * 0.18;
      e.p.rotation.y = Math.atan2(e.x1 - e.x0, e.z1 - e.z0);
      poseRunLean(e.p, (tr.t + i * 0.07) * 8);
    }
    if (tr.t >= tr.dur) finishUnitTransition(true);
  }

  // ボールマーカー（リング＋矢印）の色を変える。成功=緑 / 失敗=赤 / 通常=黄。
  // ヘッドレスのモックは material.color を持たないためガードする（見た目のみ）。
  function setMarkerColor(hex) {
    if (!ballMarker || !ballMarker.children) return;
    for (var i = 0; i < ballMarker.children.length && i < 2; i++) {
      var m = ballMarker.children[i].material;
      if (m && m.color && m.color.set) {
        m.color.set(hex);
        fixSRGBMaterialColor(m, true);
      }
    }
  }

  function outcome(formation, play) {
    // ターゲット選択があれば受け手を使用、なければ先頭WRにフォールバック
    var recvPlayer = (state.passTarget) ? state.passTarget : wr;
    var recvStats  = recvPlayer.userData.stats || {};
    var qbStats    = qb.userData.stats || {};
    // スタミナ係数（stamina 未設定なら 1.0 = 無影響）
    var recvFactor = window.BoxelGame.staminaFactor({
      current: recvPlayer.userData.stamina,
      max:     recvPlayer.userData.staminaMax
    });
    var rbFactor = window.BoxelGame.staminaFactor({
      current: rb.userData.stamina,
      max:     rb.userData.staminaMax
    });
    // カバーする DB の速度（ターゲットに最も近い CB/S）
    var coverDbSpeed = defenseStat("speed");
    if (state.passTargetDbSpeed != null) coverDbSpeed = state.passTargetDbSpeed;
    var ctx = {
      rbSpeed:   statOf(rb, "speed") * rbFactor,
      olPower:   teamStat(offense, "OL", "power"),
      wrCatch:   statOf(wr, "catch"),
      wrSpeed:   statOf(wr, "speed"),
      tapedRole: state.taped ? state.taped.role : null,
      coverage:  state.defCoverage || null,
      dPower:    defenseStat("power"),
      dSpeed:    defenseStat("speed"),
      // 個別マッチアップ
      recvCatch:  (recvStats.catch  != null ? recvStats.catch  : 6) * recvFactor,
      recvSpeed:  (recvStats.speed  != null ? recvStats.speed  : 6) * recvFactor,
      qbAcc:      qbStats.catch  != null ? qbStats.catch  : 6,
      qbArm:      qbStats.power  != null ? qbStats.power  : 6,
      coverSpeed: coverDbSpeed
    };
    // アニメ用に受け手を保存し、state から消去
    state._lastPassCarrier = recvPlayer;
    state.passTarget = null;
    state.passTargetDbSpeed = null;
    return window.BoxelGame.outcome(formation, play, ctx);
  }

  // スナップ前の反則を適用してダウンをやり直す（プレーは行わない）。
  function applyPrePenalty(pre) {
    setCards([]);
    logPlay("スナップ前反則 " + (pre.team === "off" ? "攻撃" : "守備") + pre.label + " " + pre.yards + "yd");
    if (pre.team === "off") {
      state.los = Math.max(GOAL_NEAR + 1, state.los - pre.yards);
      state.toGo += pre.yards;
      setBubble("ホイッスル先生：反則【攻撃の<b>" + pre.label + "</b>】 " + pre.yards + "ヤード罰退、ダウンやり直し。");
    } else {
      state.los = Math.min(GOAL_FAR - 1, state.los + pre.yards);
      state.toGo -= pre.yards;
      if (state.toGo <= 0) { state.down = 1; state.toGo = 10; setBubble("ホイッスル先生：反則【守備の<b>" + pre.label + "</b>】 " + pre.yards + "ヤード前進で<b>ファーストダウン</b>！"); }
      else setBubble("ホイッスル先生：反則【守備の<b>" + pre.label + "</b>】 " + pre.yards + "ヤード前進、ダウンやり直し。");
    }
    state.phase = "animating"; updateHUD();
    nextPlayReady();
  }

  function startPlay(play) {
    state.play = play;
    logInput("playCall", play);
    // 前方パスは1ダウン1回。新しいダウンの最初に既使用フラグをリセットし、パスで使用を記録。
    state.fwdPassUsed = (play === "short" || play === "long");
    var pre = window.BoxelGame.rollPrePenalty({});
    if (pre) { applyPrePenalty(pre); return; }   // スナップ前反則ならプレーせずやり直し
    var o = outcome(state.formation, play);
    logPlay("攻撃スナップ " + state.formation + "/" + playName(play) + " → " + o.msg.replace(/<[^>]+>/g, "") + " (yards=" + o.yards + ")");
    // ターゲット選択時は受け手を上書き（TE/RB へのパスにも対応）
    if ((play === "short" || play === "long") && state._lastPassCarrier) {
      wr = state._lastPassCarrier;
      state._lastPassCarrier = null;
    }
    var startZ = state.los;
    var endZ = Math.min(state.los + o.yards, GOAL_FAR);
    if (o.reason === "sack") endZ = Math.max(GOAL_NEAR + 1, state.los + o.yards);
    o.endZ = endZ;
    var dur, kind, passAirTime = 0, passYacTime = 0;
    if (o.reason === "sack") {
      // サック: ランアニメで QB を後退させる
      kind = "run"; carrier = qb; dur = 0.85;
    } else if (play === "run") { kind = "run"; carrier = rb; var sp = (carrier.userData.stats && carrier.userData.stats.speed) || 6; dur = window.BoxelGame.runDuration(o.yards, sp); }
    else {
      // パス: 投球(空中・最大18yd)とYAC(捕って走る)を別々に時間化し、受け手の走速も
      // 人間の範囲に収める。空中はボール速度 ~18yd/s 相当、YAC は runDuration（加速分は除く）。
      kind = "pass"; carrier = wr;
      var airY = Math.min(Math.max(0, o.yards), 18);
      var yacY = Math.max(0, o.yards - airY);
      var recvSp = (wr && wr.userData.stats && wr.userData.stats.speed) || 6;
      passAirTime = 0.55 + airY * 0.04;                                       // 空中(投球)時間
      passYacTime = (yacY > 0) ? Math.max(0, window.BoxelGame.runDuration(yacY, recvSp) - 0.7) : 0;  // YAC走(既に走行中＝加速分0.7除く)
      dur = passAirTime + passYacTime;
    }
    dur *= animTurbo;   // turbo時はアニメを短縮（結果は不変）

    // 初期位置を保存し、ライン攻防・タックラーを事前計算
    offense.forEach(function (p) { p.userData.px0 = p.position.x; p.userData.pz0 = p.position.z; p.position.y = 0; p.rotation.x = 0; p.rotation.z = 0; BC.poseReset(p); });
    defense.forEach(function (p) { p.userData.px0 = p.position.x; p.userData.pz0 = p.position.z; p.position.y = 0; p.rotation.x = 0; p.rotation.z = 0; BC.poseReset(p); });
    setMarkerColor(0xffe14d);   // プレー開始は中立色（黄）に戻す
    var olPower = teamStat(offense, "OL", "power");
    var dPower  = defenseStat("power");
    var tacklerIdx = window.BoxelGame.nearestDefenderIndex(
      { x: 0, z: endZ },
      defense.map(function (d) { return { x: d.position.x, z: d.position.z }; })
    );

    anim = { t: 0, dur: dur, kind: kind, o: o, startZ: startZ, endZ: endZ, phase: "move", catchZ: endZ,
             olPower: olPower, dPower: dPower, tacklerIdx: tacklerIdx };
    if (kind === "pass") {
      wr.position.z = state.los; wr.position.x = (state.formation === "shotgun" || state.formation === "single") ? 11 : 6;
      anim.wrFromZ = wr.position.z; anim.wrFromX = wr.position.x;
      anim.ballFrom = qb.position.clone();
      // 投球(空中)とYAC(捕って走る)の時間配分を距離比で決める（捕球地点でのワープを防ぐ）
      var airYards = Math.min(o.yards, 18);
      var throwDist = airYards + 6;                    // QB位置からの空中距離
      var yac = Math.max(0, o.yards - airYards);
      anim.throwFrac = Math.max(0.45, Math.min(0.85, throwDist / (throwDist + yac)));
      // 受け手の走路(wrTarget)とボールの落下点(ballLand)を分離する。
      if (o.complete) {
        var cx = lerp(anim.wrFromX, 2, 0.6);
        // 空中の飛距離は最大18ヤード（人間の限界）。残りは捕ってから走る(YAC)。
        var catchZ = state.los + Math.min(o.yards, 18);
        anim.wrTarget = new THREE.Vector3(cx, 1.4, catchZ);
        anim.ballLand = anim.wrTarget.clone();                                   // この地点でキャッチ
        // 時間配分を「空中:YAC」の所要時間比に一致させ、捕球後の走速を現実的に保つ
        // （turbo不変な比で指定。(1-throwFrac)*dur=YAC時間 → YAC走速=維持された runDuration 由来）。
        if (passAirTime + passYacTime > 0) {
          anim.throwFrac = Math.max(0.3, Math.min(0.9, passAirTime / (passAirTime + passYacTime)));
        }
      } else if (o.reason === "overthrow") {
        anim.ballLand = new THREE.Vector3(anim.wrFromX, 0.4, state.los + 4);     // 球は手前に落ちて届かない
        anim.wrTarget = new THREE.Vector3(anim.wrFromX, 1.4, state.los + 14);    // 受け手は先へ走り抜ける
      } else {
        var dz = Math.min(state.los + 12, state.los + 8);
        anim.wrTarget = new THREE.Vector3(anim.wrFromX, 1.4, dz);
        anim.ballLand = anim.wrTarget.clone();                                   // 球は受け手の所まで届いて足元へ
      }
    }
    state.phase = "animating";
    setCards([]);
    setBubble(state.formation.toUpperCase() + " で <b>" + playName(play) + "</b>！ スナップ！");
  }

  // プレー終了時のキャリア横位置から次プレーのハッシュ（state.hashX）を更新する。
  // 右(>4)=+6 / 左(<-4)=-6 / 中央=0。アウトオブバウンズ時はサイドライン寄り(±10)。
  function updateHashFromCarrier(oob) {
    var cx = (carrier && carrier.position) ? carrier.position.x : 0;
    if (oob) { state.hashX = cx >= 0 ? 10 : -10; return; }
    if (cx > 4) state.hashX = 6;
    else if (cx < -4) state.hashX = -6;
    else state.hashX = 0;
  }

  // パスプレー固有の反則を適用してダウンを進める（前進なし・罰退つき）。
  // grounding/illegalForward は loss-of-down（ダウン消費）、ineligible はダウンやり直し。
  function applyPassFoul(pf) {
    state.los = Math.max(GOAL_NEAR + 1, state.los - pf.yards);
    state.toGo += pf.yards; state.hashX = 0;   // 罰退スポットは中央
    logPlay("パス反則 " + pf.label + " 罰退" + pf.yards + " lossOfDown=" + !!pf.lossOfDown + " 新los=" + state.los);
    var head = "ホイッスル先生：反則【攻撃の<b>" + pf.label + "</b>】 " + pf.yards + "ヤード罰退";
    if (pf.lossOfDown) {
      state.down += 1;
      if (state.down > 4) {
        setBubble(head + "・ロスオブダウン。<b>4回で届かず攻守交代</b>。");
        updateHUD(); endPossession(0); return;
      }
      setBubble(head + "・<b>ロスオブダウン</b>。" + ordinal(state.down) + "ダウン。");
    } else {
      setBubble(head + "、<b>ダウンやり直し</b>。残り" + state.toGo + "ヤード。");
    }
    updateHUD(); nextPlayReady();
  }

  // ターンオーバー（INT/ファンブル喪失）を解決する。奪った側がリターンし、
  // リターンTDなら相手に6点（+自動PAT 0.94）を与えてキックオフへ。それ以外は攻守交代。
  // reason: 状況説明の文（HTML可）。
  function resolveTurnover(reason) {
    var tr = window.BoxelGame.turnoverReturn({});
    if (tr.td) {
      state.away += 6;
      var pat = gameRng() < 0.94;
      if (pat) state.away += 1;
      flashScore(); updateHUD();
      setBubble("ホイッスル先生：" + reason + "、そのまま走られて<b>リターンタッチダウン…！</b>" +
                (pat ? "（PATも成功で計7点）" : "（PATは失敗で6点）") + " 切り替えよう。");
      // 相手TD後は home が受球するキックオフ
      waitContinue(function () { startKickoff(true, function (losForHome) {
        state.los = Math.min(80, Math.max(15, losForHome));
        state.mode = "offense"; state.down = 1; state.toGo = 10; state.hashX = 0;
        state.formation = null; state.phase = "formation";
        setActiveUnits("offense"); placeFormation("single"); updateHUD(); choosePersonnelUI();
      }); });
      return;
    }
    // リターン分だけ相手の開始位置を前進させる（自陣 -z 方向＝相手が前進）。
    var retMsg = tr.yards > 0 ? (" " + tr.yards + "ヤードのリターン。") : "";
    state.los = Math.max(GOAL_NEAR + 1, Math.round(ball.position.z) - tr.yards); state.hashX = 0;
    logPlay("ターンオーバー return=" + tr.yards + " 新los=" + state.los);
    setBubble("ホイッスル先生：" + reason + "ので<b>攻守交代</b>。" + retMsg + " 今度はキミが守備、取り返そう！");
    endPossession(0);
  }

  function finalize(o) {
    recoverTape();
    // スタミナ疲労: キャリアを1消耗、関与しなかった攻撃選手を1回復（満タンまで）。
    // stamina 未設定（staminaMax なし）の選手は対象外＝無影響（後方互換）。
    if (carrier && carrier.userData.staminaMax) {
      carrier.userData.stamina = Math.max(0, (carrier.userData.stamina || 0) - 1);
    }
    offense.forEach(function (p) {
      if (p === carrier || !p.userData.staminaMax) return;
      p.userData.stamina = Math.min(p.userData.staminaMax, (p.userData.stamina || 0) + 1);
    });
    // アウトオブバウンズ判定（成功プレーのみ・低確率）。クロック停止になり消費小。
    // テストは gameRng()=0 固定のため高乱数側で発火させ誤発火を防ぐ。
    var oob = false;
    if (o.complete && (o.reason === "run" || o.reason === "catch") && gameRng() > 0.92) {
      oob = true;
    }
    // ハッシュ（横位置）の更新は「プレーが成立して通常前進する」場合だけ行う。
    // 反則やターンオーバーで再開する場合は走者の横位置を引き継がない（中央＝enforcement spot）。
    // クロック消費: 成功（インバウンズ）は40秒で継続、それ以外（不成功/ターンオーバー/
    // アウトオブバウンズ/得点/タイムアウト）はクロック停止扱いで消費小。
    var costKind;
    if (state.clockStopped) { costKind = "timeout"; state.clockStopped = false; }
    else if (oob) { costKind = "oob"; }
    else if (o.turnover) { costKind = "turnover"; }
    else if (!o.complete) { costKind = "incomplete"; }
    else if (o.reason === "run") { costKind = "run"; }
    else if (o.reason === "catch") { costKind = "short_complete"; }
    else { costKind = "incomplete"; }
    if (oob) { setBubble("ホイッスル先生：ボールキャリアが<b>サイドラインの外（アウト）</b>へ！ クロックが止まったよ。"); }
    tickClock(window.BoxelGame.playClockCost({ kind: costKind }));
    // クロック切れで試合終了になった場合は以降の処理をスキップ
    if (state.gameEnded) { return; }
    var delta = Math.round(ball.position.z - state.los);   // 符号つき前進（ロスは負）
    if (o.turnover) {
      // インターセプト＝相手ボール。奪った側がリターン（リターンTDなら相手に得点）。
      resolveTurnover(o.msg + " パスを相手に取られた");
      return;
    }
    // パスプレー固有の反則（グラウンディング/イリジブル/イリーガルフォワード）。
    // ターンオーバー以外のパスのみ。高乱数側で発火するためテストには影響しない。
    if (state.play === "short" || state.play === "long") {
      var pf = window.BoxelGame.rollPassFoul({ play: state.play, complete: o.complete });
      if (pf) { applyPassFoul(pf); return; }
    }
    // 不成功パス（落球/届かず）は前進なし・ライン不変。ダウンだけ消費する。
    if (!o.complete) {
      logPlay("不成功パス (" + o.reason + ") 前進なし");
      state.down += 1;
      if (state.down > 4) {
        setBubble("ホイッスル先生：" + o.msg + " 前進できず、<b>4回で10ヤードに届かず攻守交代</b>。今度はキミが守備だよ。");
        endPossession(0); return;
      }
      var hm = "ホイッスル先生：" + o.msg + " 前進なし、ラインはそのまま。残り" + state.toGo + "ヤード。";
      if (state.down === 4) hint("fourth", hm + " <b>4回目</b>！ 行く？ キック（FG/パント）も選べるよ。");
      else setBubble(hm + " " + ordinal(state.down) + "ダウン、いってみよう！");
      nextPlayReady(); return;
    }
    if (ball.position.z >= GOAL_FAR - 0.5) {
      logPlay("タッチダウン！ home 6点");
      state.home += 6;             // タッチダウンは6点。追加点は PAT / 2ポイントで選ぶ
      flashScore();
      hint("td", "ホイッスル先生：<b>タッチダウン！ 6点</b>！ 追加点をねらおう。");
      afterTouchdown(); return;
    }
    // ファンブル判定（ボールを保持して走った/捕ったプレーのみ）。
    // テストは gameRng()=0 固定のため、高乱数側で発生させ誤発火を防ぐ（確率は同じ）。
    if (o.complete && carrier) {
      var fprob = window.BoxelGame.fumbleProbability(statOf(carrier, "power"));
      if (gameRng() > 1 - fprob) {
        if (gameRng() > 0.5) {   // 相手がリカバー → 奪った側がリターン
          state.los = Math.round(ball.position.z);
          resolveTurnover("<b>ファンブル！</b> こぼれたボールを相手に確保された…");
          return;
        }
        o.msg = "あぶないファンブル！ 自分で確保。 " + o.msg;   // 味方リカバー → 続行
      }
    }
    // プレー中の反則（受諾/辞退を自動判定）。テスト安定のため高乱数側で発火。
    var prevLos = state.los, playEndLos = Math.round(ball.position.z);
    var pen = window.BoxelGame.rollPlayPenalty({});
    if (pen) {
      if (pen.team === "def") {                 // 守備の反則＝攻撃有利。攻撃にとって良い方を選ぶ
        var penLos = Math.min(GOAL_FAR - 1, prevLos + pen.yards);
        var playGotFirst = (playEndLos - prevLos) >= state.toGo;   // プレーで既にファーストダウンか
        var accept = (penLos > playEndLos) || (pen.autoFirst && !playGotFirst);
        logPlay("守備反則 " + pen.label + " prevLos=" + prevLos + " 着地=" + playEndLos + " penLos=" + penLos + " 自動FD=" + pen.autoFirst + " 判定=" + (accept ? "受諾" : "辞退"));
        if (accept) {
          state.los = penLos; state.hashX = 0;   // 罰退スポットは中央（走者の横位置を引き継がない）
          if (pen.autoFirst) { state.down = 1; state.toGo = 10; }
          else { state.toGo -= (penLos - prevLos); if (state.toGo <= 0) { state.down = 1; state.toGo = 10; } }
          setBubble("ホイッスル先生：反則【守備の<b>" + pen.label + "</b>】受諾！ " + (pen.autoFirst ? "<b>自動ファーストダウン</b>＋" : "") + pen.yards + "ヤード前進。");
          updateHUD(); nextPlayReady(); return;
        }
        // 辞退 → プレー結果を採用（下へ続行）
      } else {                                  // 攻撃の反則＝守備有利。前進プレーなら帳消しに受諾
        if (playEndLos - prevLos >= 0) {
          state.los = Math.max(GOAL_NEAR + 1, prevLos - pen.yards); state.hashX = 0;
          state.toGo += pen.yards;
          logPlay("攻撃反則 " + pen.label + " 受諾 罰退" + pen.yards + " 新los=" + state.los);
          setBubble("ホイッスル先生：反則【攻撃の<b>" + pen.label + "</b>】 守備が受諾。" + pen.yards + "ヤード罰退、ダウンやり直し。");
          updateHUD(); nextPlayReady(); return;
        }
        // 辞退 → プレー結果を採用
      }
    }
    updateHashFromCarrier(oob);                 // 通常前進が確定した時だけハッシュを走者位置で更新
    state.los = Math.round(ball.position.z);
    // セーフティ: 自陣エンドゾーン内/後方で止められた → 相手に2点、フリーキックで攻守交代
    if (state.los <= GOAL_NEAR) {
      state.away += 2; flashScore();
      setBubble("ホイッスル先生：自陣エンドゾーンで止められた…<b>セーフティ！ 相手に2点</b>。フリーキックで攻守交代。");
      state.los = GOAL_FAR - 40;   // フリーキック後、相手は自陣40付近から
      endPossession(0); return;
    }
    state.toGo -= delta;           // ロス（負）は残りヤードが増える
    var note = o.msg + "（" + delta + "ヤード）";
    // 計測（チェーン）演出: ファーストダウンラインとの差が1ヤード以内の僅差なら
    // 「計測中…」を一拍はさんでから判定する（常時ではなく僅差時のみ）。
    if (Math.abs(state.toGo) <= 1) {
      setBubble("ホイッスル先生：きわどい…！ <b>計測中…</b> チェーンを持ってこよう。");
      waitContinue(function () { concludeAdvance(note, true); });
      return;
    }
    concludeAdvance(note, false);
  }

  // 前進確定後のダウン処理（ファーストダウン/ダウン更新/ターンオーバー・オン・ダウンズ）。
  // measured=true は計測演出を経た僅差ケース（届いた/わずかに届かずの言い回しにする）。
  function concludeAdvance(note, measured) {
    logPlay("前進確定 los=" + state.los + " down=" + state.down + " toGo=" + state.toGo + (measured ? " (計測)" : ""));
    if (state.toGo <= 0) {
      state.down = 1; state.toGo = 10;
      var reach = measured ? "（計測の結果、<b>届いた！</b>）" : "";
      hint("first", "ホイッスル先生：" + note + " " + reach + "<b>ファーストダウン！</b> 10ヤード進めたから、また4回チャンスがもらえるよ！");
    } else {
      state.down += 1;
      var nudge = measured ? "（計測の結果、<b>わずかに届かず</b>…）" : "";
      if (state.down > 4) {
        setBubble("ホイッスル先生：" + note + " " + nudge + "<b>4回のチャンスで10ヤードに届かず、攻守交代</b>。今度はキミが守備だよ。");
        endPossession(0); return;
      }
      var h = "ホイッスル先生：" + note + " " + nudge + "残り" + state.toGo + "ヤード。";
      if (state.down === 4) hint("fourth", h + " <b>4回目</b>！ 行く？ キック（FG/パント）も選べるよ。");
      else setBubble(h + " " + ordinal(state.down) + "ダウン、いってみよう！");
    }
    nextPlayReady();
  }

  // タッチダウン後の追加点（トライ・フォー・ポイント）。PAT=キックで1点 / 2ポイント=プレーで2点。
  function afterTouchdown() {
    state.phase = "formation";
    setBubble("ホイッスル先生：<b>追加点</b>をどうする？（PATは確実に1点、2ポイントは成功で2点・リスクあり）");
    setCards([
      { ico: "🥅", t: "PAT（キック）", d: "ほぼ確実に1点。計7点を狙う", fn: function () { resolveTry("pat"); } },
      { ico: "💥", t: "2ポイント", d: "プレーで2点。成功すれば計8点", fn: function () { resolveTry("two"); } }
    ]);
  }
  function resolveTry(kind) {
    logInput("try", kind);
    setCards([]);
    state.phase = "animating";
    if (kind === "pat") {
      if (gameRng() < 0.94) { state.home += 1; setBubble("ホイッスル先生：<b>PAT成功！</b> 計7点。"); }
      else setBubble("ホイッスル先生：<b>PAT失敗…</b> 6点のまま。切り替えよう。");
    } else {
      if (gameRng() < 0.47) { state.home += 2; setBubble("ホイッスル先生：<b>2ポイント成功！</b> 計8点！ ナイス勝負。"); }
      else setBubble("ホイッスル先生：<b>2ポイント失敗…</b> 6点のまま。ドンマイ。");
    }
    flashScore(); updateHUD();
    // TD後: キックオフ種別選択（通常 or オンサイド）
    waitContinue(chooseKickoffTypeUI);
  }

  // 攻守交代：守備フェーズへ移行する
  // 直前に出た「なぜ攻守交代したか」の説明を読む時間をとってから守備選択へ進む（教育目的）
  function endPossession(pinBonus) {
    state.mode = "defense";
    state.hashX = 0;            // 攻守交代でハッシュを中央へリセット
    state.defLos = state.los;
    state.defPin = pinBonus || 0;
    state.cpuStyle = window.BoxelGame.pickCpuStyle();
    state.phase = "animating";   // 説明表示中は操作不可（カードを出さない）
    updateHUD();
    waitContinue(startOppPossession);
  }

  // ===== 相手（CPU）の攻撃：あなたと同じ4ダウン制。毎ダウン守りの作戦を選ぶ。=====
  function startOppPossession() {
    setActiveUnits("defense");        // homeDef/awayOff に切り替え（placeOppFormation より前）
    state.drive += 1;                 // この攻守交代を1ドライブとして数える
    state.oppLos = state.defLos;
    state.oppDown = 1;
    state.oppToGo = 10;
    oppDownUI();
  }

  function oppYardInfo() {
    var toGoal = Math.max(0, Math.round(state.oppLos - GOAL_NEAR));
    return "相手 " + ordinal(state.oppDown) + " & " + Math.max(0, state.oppToGo) + "（ゴールまで" + toGoal + "ヤード）";
  }

  // 1段目：守りの構え（フロント）。攻撃の「隊形」と対称。
  function oppDownUI() {
    state.phase = "formation";
    placeOppFormation();              // 相手=攻撃 / 味方=守備 に整列
    updateHUD();
    setBubble("ホイッスル先生：" + oppYardInfo() + "。まず<b>守りの構え</b>は？");
    setCards([
      { ico: "🛡️", t: "ラン重視", d: "中央を固める。ランを止めやすい", fn: function () { oppPickFront("runStop"); } },
      { ico: "⚖️", t: "バランス", d: "ランもパスも無難に守る", fn: function () { oppPickFront("balanced"); } },
      { ico: "🪁", t: "パス重視", d: "後ろを厚く。パスを防ぎやすい", fn: function () { oppPickFront("passDef"); } }
    ]);
  }

  // 2段目：守り方（カバレッジ）。攻撃の「プレー」と対称。
  function oppPickFront(front) {
    logInput("defFront", front);
    state.defFront = front;
    setBubble("ホイッスル先生：次に<b>守り方（作戦）</b>を選ぼう！");
    setCards([
      { ico: "🧲", t: "マン", d: "受け手に張り付く。ショートに強い", fn: function () { oppPickCoverage("man"); } },
      { ico: "🕸️", t: "ゾーン", d: "後ろを広く守る。ロングに強い", fn: function () { oppPickCoverage("zone"); } },
      { ico: "⚡", t: "ブリッツ", d: "前に詰めて突っ込む。ランに強い", fn: function () { oppPickCoverage("blitz"); } }
    ]);
  }

  function oppPickCoverage(coverage) {
    logInput("defCov", coverage);
    setCards([]);
    state.phase = "animating";
    var cpuPlay = window.BoxelGame.pickCpuPlay({ down: state.oppDown, toGo: state.oppToGo, cpuStyle: state.cpuStyle });
    var ctx = {
      rbSpeed: defenseStat("speed"), olPower: defenseStat("power"),
      wrCatch: defenseStat("catch"), wrSpeed: defenseStat("speed"),
      coverage: coverage, tapedRole: null,
      dPower: avgStat(offense, "power"),   // 味方守備(homeDef)の強さ
      dSpeed: avgStat(offense, "speed")    // 味方守備の速さ
    };
    var r = window.BoxelGame.outcome("single", cpuPlay, ctx);   // カバレッジ(三角)で1プレーを解決
    logPlay("相手スナップ " + playName(cpuPlay) + "(守備=" + coverage + ") → " + r.msg.replace(/<[^>]+>/g, "") + " (yards=" + r.yards + ")");
    // 相手プレーでもクロックを消費する（ランは40秒、パス不成功/ターンオーバーは6秒）
    var oppCostKind;
    if (r.turnover) { oppCostKind = "turnover"; }
    else if (!r.complete) { oppCostKind = "incomplete"; }
    else if (cpuPlay === "run") { oppCostKind = "run"; }
    else { oppCostKind = "short_complete"; }
    tickClock(window.BoxelGame.playClockCost({ kind: oppCostKind }));
    // クロック切れで試合終了になった場合は以降の処理をスキップ
    if (state.gameEnded) { return; }
    var gain = (r.complete === false) ? 0 : r.yards;
    // 守りの構え（フロント）= 二段目の読み。ラン重視/パス重視で相手の得意手を抑える。
    var fmult = 1;
    if (state.defFront === "runStop")      fmult = (cpuPlay === "run") ? 0.5 : 1.15;
    else if (state.defFront === "passDef") fmult = (cpuPlay !== "run") ? 0.55 : 1.15;
    gain = Math.max(0, Math.round(gain * fmult));
    var startZ = state.oppLos;
    var endZ = Math.max(GOAL_NEAR, startZ - gain);              // 相手は自陣ゴール(-z)へ前進
    var td = !r.turnover && endZ <= GOAL_NEAR + 0.5;
    startDefensePlay(startZ, endZ, td, function () { oppAfterPlay(r, gain, endZ, td, cpuPlay); });
  }

  function oppAfterPlay(r, gain, endZ, td, cpuPlay) {
    var pn = playName(cpuPlay);
    if (r.turnover) {                                            // インターセプト＝あなたが奪い返す
      setBubble("ホイッスル先生：" + r.msg + " <b>ボールを奪い返した！</b> あなたの攻撃だよ！");
      waitContinue(function () { concludeOppPossession(Math.round(endZ)); });
      return;
    }
    if (td) {
      state.away += 6;                                  // 相手TDは6点
      var pat = gameRng() < 0.94;                   // CPUは基本PAT
      if (pat) state.away += 1;
      flashScore();
      setBubble("ホイッスル先生：相手の" + pn + "が決まって<b>タッチダウン…</b>" + (pat ? "（PATも成功で計7点）" : "（PATは失敗で6点）") + " 切り替えていこう！");
      // 相手TD後はhomeが受球するキックオフ
      waitContinue(function () { startKickoff(true, function (losForHome) {
        concludeOppPossession(losForHome);
      }); });
      return;
    }
    state.oppLos = endZ;
    state.oppToGo -= gain;
    if (state.oppToGo <= 0) {
      state.oppDown = 1; state.oppToGo = 10;
      setBubble("ホイッスル先生：相手の" + pn + "で" + gain + "ヤード、<b>相手にファーストダウン</b>を許した…！");
      waitContinue(oppDownUI);
    } else {
      state.oppDown += 1;
      if (state.oppDown > 4) {
        setBubble("ホイッスル先生：<b>4ダウン守り切った！</b> ナイスディフェンス！ あなたの攻撃だよ！");
        waitContinue(function () { concludeOppPossession(Math.round(state.oppLos)); });
      } else {
        setBubble("ホイッスル先生：相手の" + pn + "で" + gain + "ヤード。" + oppYardInfo() + "、まだ守れる！");
        waitContinue(oppDownUI);
      }
    }
  }

  function concludeOppPossession(yourLos) {
    // 試合終了済みの場合はスキップ
    if (state.gameEnded) { return; }
    // Q4（または延長Q5）終了後は試合終了
    if (state.quarter > 4 || (state.quarter >= 4 && state.clock <= 0)) { gameOver(); return; }
    recoverTape();
    state.mode = "offense";
    state.hashX = 0;                  // 新シリーズはハッシュを中央へ
    state.down = 1; state.toGo = 10;
    state.los = Math.min(80, Math.max(15, yourLos));
    state.formation = null; state.phase = "formation";
    setActiveUnits("offense");        // homeOff/awayDef に戻す（placeFormation より前）
    placeFormation("single"); updateHUD(); choosePersonnelUI();
  }

  // 相手=攻撃側 / 味方=守備側 に整列（見せるだけ）。11体を均等分散。
  function placeOppFormation() {
    var oppLos = state.oppLos;
    var n = defense.length;
    for (var d = 0; d < n; d++) {
      var dx = (n > 1) ? (d * (24 / (n - 1)) - 12) : 0;
      defense[d].position.set(dx, 0, oppLos + 1);
      defense[d].rotation.set(0, Math.PI, 0);   // 自陣ゴール(-z)方向を向く
      BC.poseReset(defense[d]);
    }
    var dline = Math.max(GOAL_NEAR + 2, oppLos - 7);
    var m = offense.length;
    for (var o = 0; o < m; o++) {
      var ox = (m > 1) ? (o * (24 / (m - 1)) - 12) : 0;
      offense[o].position.set(ox, 0, dline);
      offense[o].rotation.set(0, 0, 0);         // 相手(+z)方向を向く
      BC.poseReset(offense[o]);
    }
    applyHashShift(offense);
    applyHashShift(defense);
    setBall(state.hashX || 0, oppLos - 0.3, 1.3);
  }

  // キック局面でスペシャルチーム専用ユニットをフィールドに整列させる（見せるだけ）。
  // setActiveUnits("special") 済みであること。kickZ=ボールのある縦位置（LOS相当）。
  // kickerIsHome=true なら home特殊がキック側（手前）に並ぶ。
  function placeSpecialFormation(kickZ, kickerIsHome) {
    // 自軍(home=offense=homeSpec)は常に手前(低z)、相手(away=defense=awaySpec)は奥(高z)に固定。
    // 通常プレーと同じ向き（誰が蹴るかで左右の側は入れ替えない）。
    var home = offense, away = defense;
    for (var i = 0; i < home.length; i++) {
      var hx = (home.length > 1) ? (i * (40 / (home.length - 1)) - 20) : 0;
      home[i].position.set(hx, 0, kickZ - 7);
      home[i].rotation.set(0, 0, 0);            // 相手(+z)を向く
      BC.poseReset(home[i]);
    }
    for (var j = 0; j < away.length; j++) {
      var ax = (away.length > 1) ? (j * (40 / (away.length - 1)) - 20) : 0;
      away[j].position.set(ax, 0, kickZ + 7);
      away[j].rotation.set(0, Math.PI, 0);      // 自軍(-z)を向く
      BC.poseReset(away[j]);
    }
  }

  // 相手の1プレーを可視化する（startZ→endZ へ前進、味方が追って止める/得点）。
  // defense=awayOff（攻撃ロール）のため CB は存在しない。RB/WR/先頭の順で carrier を選ぶ。
  function startDefensePlay(startZ, endZ, td, onDone) {
    var carrier = null;
    for (var i = 0; i < defense.length; i++) { if (defense[i].userData.role === "RB") { carrier = defense[i]; break; } }
    if (!carrier) { for (var i = 0; i < defense.length; i++) { if (defense[i].userData.role === "WR") { carrier = defense[i]; break; } } }
    if (!carrier) carrier = defense[0];
    carrier.position.set(0, 0, startZ);
    var blockers = defense.filter(function (x) { return x !== carrier; });
    defAnim = { t: 0, dur: 1.1 * animTurbo, phase: "run", startZ: startZ, endZ: endZ, carrier: carrier, blockers: blockers, td: !!td, onDone: onDone };
    setCarriedBall(carrier);
  }

  function nearestHome(c) {
    var best = offense[0], bd = Infinity;
    offense.forEach(function (o) {
      var dx = o.position.x - c.position.x, dz = o.position.z - c.position.z, d2 = dx * dx + dz * dz;
      if (d2 < bd) { bd = d2; best = o; }
    });
    return best;
  }

  function updateDefenseAnim(dt) {
    if (!defAnim) return;
    var c = defAnim.carrier;
    if (defAnim.phase === "run") {
      defAnim.t += dt;
      var p = Math.min(1, defAnim.t / defAnim.dur);
      c.position.z = lerp(defAnim.startZ, defAnim.endZ, p);
      c.position.x = Math.sin(p * 6) * 0.8 * (1 - p);                  // 緩急をつけて走る（直線にしない）
      c.position.y = Math.abs(Math.sin(p * 16)) * 0.22;
      poseRunLean(c, p * 8);
      // 相手の攻撃側もロール別に: OL/TE=味方守備へブロック / WR・RB・QB=前方へルート
      defAnim.blockers.forEach(function (b) {
        var brl = b.userData.role;
        if (brl === "OL" || brl === "TE") {
          var df = nearestIn(offense, b.position.x, b.position.z, null);   // 最寄りの味方守備に当たる
          if (df) {
            var bt = targetShortOf(
              { x: b.position.x, z: b.position.z },
              { x: df.position.x, z: df.position.z },
              1.1,
              b.id + df.id
            );
            b.position.x += (bt.x - b.position.x) * Math.min(1, dt * 1.5);
            b.position.z += (bt.z - b.position.z) * Math.min(1, dt * 1.5);
            b.rotation.y = Math.atan2(df.position.x - b.position.x, df.position.z - b.position.z);
            BC.poseRun(b, p * 8);
          }
        } else {
          // WR/RB/QB: 前方(-z)へ進みつつ外へ開く（ルート/リード風）
          var dir = (b.position.x >= 0) ? 1 : -1;
          b.position.z = lerp(defAnim.startZ + 1, defAnim.endZ - 1, p);
          b.position.x += dir * dt * 1.6;
          b.rotation.y = Math.PI;
          poseRunLean(b, p * 8);
        }
      });
      // 味方守備をロール別に動かす（全員ボールへ殺到しない・敵守備と同じ思想）
      var tIdx = 0, tBest = Infinity;                                    // 最寄りの味方=タックラー
      for (var ti = 0; ti < offense.length; ti++) {
        var ax = offense[ti].position.x - c.position.x, az = offense[ti].position.z - c.position.z;
        var ad = ax * ax + az * az;
        if (ad < tBest) { tBest = ad; tIdx = ti; }
      }
      for (var oi = 0; oi < offense.length; oi++) {
        var o = offense[oi], orl = o.userData.role, isTk = (oi === tIdx);
        if (orl === "DL" && !isTk) {                                     // DL: 相手OLに当たって押し合う
          var ol = nearestIn(defense, o.position.x, o.position.z, "OL");
          if (ol) {
            var ot = targetShortOf(
              { x: o.position.x, z: o.position.z },
              { x: ol.position.x, z: ol.position.z },
              1.1,
              o.id + ol.id
            );
            o.position.x += (ot.x - o.position.x) * Math.min(1, dt * 1.4);
            o.position.z += (ot.z - o.position.z) * Math.min(1, dt * 1.4);
            o.rotation.y = Math.atan2(ol.position.x - o.position.x, ol.position.z - o.position.z);
            BC.poseRun(o, p * 8);
          }
          continue;
        }
        // タックラー=強収束 / CB=速い / S=深さを保ち後方で待つ / LB=中速
        var spd = isTk ? 5.5 : (orl === "CB" ? 3.0 : (orl === "S" ? 1.4 : 2.4));
        var ct = targetShortOf(
          { x: o.position.x, z: o.position.z },
          { x: c.position.x, z: c.position.z },
          1.0,
          o.id + c.id
        );
        var tgt = window.BoxelGame.pursuitTarget(
          { x: o.position.x, z: o.position.z }, ct, dt * spd);
        o.position.x = tgt.x; o.position.z = tgt.z;
        o.rotation.y = Math.atan2(c.position.x - o.position.x, c.position.z - o.position.z);
        poseRunLean(o, p * 8);
      }
      setCarriedBall(c);
      applyVisualSeparation(c);
      if (p >= 1) {
        defAnim.phase = "end"; defAnim.endT = 0; defAnim.tackler = nearestHome(c);
        if (defAnim.td) spawnConfetti(c.position.x, c.position.y + 2.8, c.position.z, 60);
      }
      return;
    }
    // phase === "end": タックル/得点の決めの見た目
    defAnim.endT += dt;
    var ep = Math.min(1, defAnim.endT / 0.45);
    if (defAnim.td) {
      c.position.y = Math.abs(Math.sin(ep * Math.PI * 2)) * (1 - ep) * 0.7;   // TD: 喜ぶ
      BC.poseCheer(c, ep);
    } else {
      c.rotation.x = -1.2 * ep;                                              // 味方が止めて倒す
      c.position.y = Math.max(0, 0.2 * (1 - ep));
      var tk = defAnim.tackler;
      if (tk) {
        tk.position.x = lerp(tk.position.x, c.position.x, ep * 0.4);
        tk.position.z = lerp(tk.position.z, c.position.z + 0.9, ep * 0.4);
        tk.rotation.x = -0.4 * ep;
      }
    }
    applyVisualSeparation(c);
    setCarriedBall(c, Math.max(0.75, 1.0 - ep * 0.25));
    if (ep >= 1) {
      var cb = defAnim.onDone;
      offense.forEach(function (p0) { BC.poseReset(p0); });
      defense.forEach(function (p1) { BC.poseReset(p1); });
      defAnim = null;
      if (cb) cb();
    }
  }

  // キックオフ処理（非インタラクティブ・waitContinueで一拍おく）
  // receivingIsHome: true=homeチームが受球, onDone(losForReceiver): 完了コールバック
  function startKickoff(receivingIsHome, onDone) {
    // キックオフはスペシャルチーム専用ユニットで行う（蹴る側＝受球しない側）。
    setActiveUnits("special");
    placeSpecialFormation(GOAL_NEAR + 35, !receivingIsHome);
    var kr = window.BoxelGame.kickoffResult({});
    var kindMsg = (kr.kind === "touchback") ? "タッチバック！ 自陣25ヤードから。" :
                  (kr.kind === "fairCatch") ? "フェアキャッチ！ 自陣25ヤードから。" :
                  (kr.kind === "bigReturn") ? "ビッグリターン！ 自陣" + kr.yards + "ヤードから！" :
                  "リターン。自陣" + kr.yards + "ヤードから。";
    setBubble("ホイッスル先生：スペシャルチーム登場！ キックオフ！ " + kindMsg);
    logPlay("キックオフ 受球=" + (receivingIsHome ? "味方" : "相手") + " " + kr.kind + " 自陣" + kr.yards);
    var losForReceiver = receivingIsHome
      ? (GOAL_NEAR + kr.yards)
      : (GOAL_FAR - kr.yards);
    waitContinue(function () { restoreUnits(); onDone(losForReceiver); });
  }

  // FGのキック弧アニメーション（見た目のみ・結果は不変）。
  // ボールが state.los から targetZ へ弧を描いて飛ぶ。success=true は左右中央を通過、
  // false は左右どちらかへ外れる軌道。アニメ完了で onDone を呼ぶ。
  // animate() ループ内の updateFGKick(dt) が進行を駆動する（ヘッドレスでは pump で駆動）。
  function animateFGKick(targetZ, success, onDone) {
    var startX = 0, startZ = state.los;
    var endX = success ? 0 : (gameRng() < 0.5 ? 8 : -8);   // 失敗はアップライト外へ外れる
    fgKick = { t: 0, dur: 1.5, startX: startX, startZ: startZ, endX: endX, endZ: targetZ,
               success: success, onDone: onDone };
    setMarkerColor(success ? 0x35c759 : 0xff3b30);
    setBall(startX, startZ, 1.4);
  }

  function updateFGKick(dt) {
    if (!fgKick) return;
    fgKick.t += dt;
    var p = Math.min(1, fgKick.t / fgKick.dur);
    var x = lerp(fgKick.startX, fgKick.endX, p);
    var z = lerp(fgKick.startZ, fgKick.endZ, p);
    var y = 1.4 + p * (1 - p * 0.4) * 16;   // 急上昇してゴールポスト付近（y≈11）を通過
    setBall(x, z, y);
    if (p >= 1) {
      if (fgKick.success && !fgKick.burst) {
        fgKick.burst = true;
        spawnConfetti(0, 8.2, 112, 64);
        pulseGoalPost();
      }
      var cb = fgKick.onDone; fgKick = null; if (cb) cb();
    }
  }

  // 自分の得点後のキックオフ種別選択（通常 / オンサイド）
  function chooseKickoffTypeUI() {
    state.phase = "formation";
    setBubble("ホイッスル先生：<b>キックオフ</b>の種別を選ぼう！");
    setCards([
      { ico: "🏈", t: "通常キック", d: "深く蹴ってタッチバック狙い", fn: function () { chooseKickoffTypeUI_resolve(false); } },
      { ico: "⚡", t: "オンサイド", d: "約15%で自チームリカバー。博打", fn: function () { chooseKickoffTypeUI_resolve(true); } }
    ]);
  }

  function chooseKickoffTypeUI_resolve(onside) {
    setCards([]);
    state.phase = "animating";
    if (onside) {
      var recovered = window.BoxelGame.onsideRecovered({});
      if (recovered) {
        setBubble("ホイッスル先生：<b>オンサイドキック成功！</b> 自チームがリカバー！ 攻撃継続だ！");
        waitContinue(function () {
          state.los = GOAL_FAR - 45;
          state.down = 1; state.toGo = 10; state.formation = null; state.phase = "formation";
          updateHUD(); choosePersonnelUI();
        });
      } else {
        setBubble("ホイッスル先生：<b>オンサイドキック失敗…</b> 相手がリカバー。相手有利な位置から。");
        waitContinue(function () {
          state.los = GOAL_FAR - 48;
          endPossession(0);
        });
      }
    } else {
      startKickoff(false, function (losForAway) {
        state.los = losForAway; endPossession(0.1);
      });
    }
  }

  function gameOver() {
    state.gameEnded = true;
    var s = document.getElementById("start");
    var res = state.home > state.away ? "勝ち！" : state.home < state.away ? "負け…" : "引き分け";
    s.querySelector("h1").textContent = "試合終了：" + res;
    s.querySelector("p").textContent = "うちのチーム " + state.home + " ― " + state.away + " あいて";
    document.getElementById("startBtn").textContent = "もう一度あそぶ";
    s.style.display = "flex";
  }

  // クォータークロックを進める。0以下になればクォーター終了処理を呼ぶ。
  function tickClock(seconds) {
    state.clock -= seconds;
    // Q2/Q4 で残り TWO_MIN_WARN 秒を初めて切った場合のメッセージ
    if (!state.twoMinWarned && state.clock < TWO_MIN_WARN && (state.quarter === 2 || state.quarter === 4)) {
      state.twoMinWarned = true;
      setBubble("ホイッスル先生：残り時間わずか！ ラスト" + TWO_MIN_WARN + "秒を切ったよ！");
    }
    if (state.clock <= 0) {
      advanceQuarter();
    }
  }

  // プレイヤーのタイムアウト。攻撃/守備どちらの局面でも使用可。
  // 残数を1つ消費し、次のプレーでクロックを止める（消費小）。前後半3個ずつ。
  function useTimeout() {
    logInput("timeout", null);
    if (state.gameEnded) return;
    if (state.timeoutsHome <= 0) {
      setBubble("ホイッスル先生：もうタイムアウトは残ってないよ！");
      return;
    }
    state.timeoutsHome -= 1;
    state.clockStopped = true;   // 次のプレーはクロック停止扱い（消費小）
    setBubble("ホイッスル先生：<b>タイムアウト！</b> クロックを止めたよ。残り" + state.timeoutsHome + "個。");
    updateHUD();
  }

  // クォーターを進める。Q4 終了で試合終了（同点なら延長）。
  function advanceQuarter() {
    state.clock = 0;
    if (state.quarter >= 4) {
      if (state.home === state.away && state.quarter === 4) {
        // 延長戦（Q5 扱い）
        state.quarter = 5;
        state.clock = QUARTER_LENGTH;
        state.twoMinWarned = false;
        setBubble("ホイッスル先生：同点！ <b>延長戦</b>突入！ もう一クォーター、決めにいこう！");
        return;
      }
      gameOver();
      return;
    }
    state.quarter++;
    state.clock = QUARTER_LENGTH;
    state.twoMinWarned = false;
    if (state.quarter === 3) {
      // ハーフタイム: タイムアウトリセット
      state.timeoutsHome = 3;
      state.timeoutsAway = 3;
      setBubble("ホイッスル先生：<b>ハーフタイム！</b> Q" + state.quarter + " スタート。タイムアウトがリセットされたよ！");
    } else {
      setBubble("ホイッスル先生：<b>Q" + state.quarter + " スタート！</b>");
    }
    updateHUD();
  }

  function resetGame() {
    recoverTape();
    // 再現モードが有効なら、同じシードで乱数を巻き戻してから開始（試合を決定論的に再現可能）。
    if (replaySeed != null) enableReplay(replaySeed);
    sysLog = []; sysSeq = 0;
    state.home = 0; state.away = 0; state.drive = 0;
    state.down = 1; state.toGo = 10; state.los = 40; state.formation = null; state.phase = "formation";
    state.mode = "offense"; state.cpuStyle = null;
    state.quarter = 1; state.clock = QUARTER_LENGTH;
    // gameStart は state をQ1/満タンクロックへリセットした後に記録する
    // （前の試合の quarter/clock を引き継いで誤記録しないため。連続自動プレー時に効く）
    logSys({ ev: "gameStart", seed: replaySeed });
    state.timeoutsHome = 3; state.timeoutsAway = 3; state.twoMinWarned = false;
    state.clockStopped = false; state.gameEnded = false;
    state.hashX = 0; state.fwdPassUsed = false;
    state.passTarget = null; state.passTargetDbSpeed = null; state._lastPassCarrier = null;
    hintsShown = {};
    initStamina(homeOff); initStamina(homeDef); initStamina(awayOff); initStamina(awayDef);
    setActiveUnits("offense");
    updateHUD();
    // オープニングキックオフ（homeが受球）。非インタラクティブでwaitContinueにより即choosePersonnelUIへ到達。
    startKickoff(true, function (losForHome) {
      state.los = Math.min(80, Math.max(15, losForHome));
      updateHUD(); choosePersonnelUI();
    });
  }

  function nextPlayReady() {
    updateHUD();
    state.phase = "formation"; state.formation = null;
    maybeTape();
    placeFormationLater();
  }
  function placeFormationLater() {
    waitContinue(function () { chooseFormationUI(); });
  }

  // けが・テーピング補助（低頻度。次の1プレーだけ担当プレーが軽く不利になる）
  function maybeTape() {
    if (tapeCooldown > 0) { tapeCooldown--; return; }
    if (gameRng() > 0.15) return;
    if (state.taped) return;
    var idx = Math.floor(rand(0, offense.length));
    var p = offense[idx];
    if (!p) return;
    var band = box(0.42, 0.16, 0.5, 0xffffff, 0.32, 0.22, 0.02);
    p.add(band);
    state.taped = { role: p.userData.role, name: p.userData.name || "せんしゅ", band: band, player: p };
    pendingTape = state.taped;
    tapeCooldown = 3;
  }

  // テーピングは1プレーで回復（帯を外して通常状態に戻す）
  function recoverTape() {
    var t = state.taped;
    if (!t) return;
    if (t.band && t.player) t.player.remove(t.band);
    state.taped = null;
  }

  // スタミナの初期化（リセット時に全選手を満タンにする）
  function initStamina(players) {
    if (!players) return;
    players.forEach(function (p) {
      var s = p.userData.stats;
      var max = (s && s.stamina != null) ? s.stamina : 8;
      p.userData.stamina    = max;
      p.userData.staminaMax = max;
    });
  }

  function ordinal(d) { return d === 1 ? "1st" : d === 2 ? "2nd" : d === 3 ? "3rd" : "4th"; }
  function playName(p) { return p === "run" ? "ラン（走る）" : p === "short" ? "ショートパス" : "ロングパス"; }

  function hint(key, text) {
    if (!hintsShown[key]) { hintsShown[key] = true; setBubble(text); }
    else setBubble(text.replace(/<b>|<\/b>/g, ""));
  }
  function setBubble(html) { document.getElementById("bubble").innerHTML = html; }

  // ===== 乱数源と再現（リプレイ）システム =====
  // gameRng は既定で global Math.random を参照（テストの上書きに追従・非シード）。
  // 再現モードを有効にすると、シードから決定論的 PRNG に差し替え、同じシード＋同じ操作で100%再現できる。
  var gameRng = function () { return Math.random(); };
  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      var t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  var replaySeed = null;            // 現在のシード（再現モード時のみ非null）
  function enableReplay(seed) {
    replaySeed = (seed >>> 0);
    var rng = mulberry32(replaySeed);
    gameRng = rng;
    if (window.BoxelGame && window.BoxelGame.setRng) window.BoxelGame.setRng(rng);
    logSys({ ev: "seed", seed: replaySeed });
  }
  function disableReplay() {
    replaySeed = null;
    gameRng = function () { return Math.random(); };
    if (window.BoxelGame && window.BoxelGame.setRng) window.BoxelGame.setRng(null);
  }

  // ===== システムログ（デバッグ用・再現性100%）=====
  // シード＋各イベントの状態を構造化記録。seed＋同じ操作列で完全再現できる。
  var sysLog = [], sysSeq = 0;
  function logSys(obj) {
    obj.i = sysSeq++;
    obj.q = state.quarter; obj.clock = Math.round(state.clock); obj.mode = state.mode;
    obj.down = state.down; obj.toGo = state.toGo; obj.los = state.los;
    obj.home = state.home; obj.away = state.away; obj.seed = replaySeed;
    sysLog.push(obj);
    if (sysLog.length > 3000) sysLog.shift();
  }
  function sysLogJSON() { return JSON.stringify({ seed: replaySeed, entries: sysLog }); }

  // ===== ユーザー用ログ（画面＋コンソール・人間可読のプレー実況）=====
  var playLog = [];
  function mmss(sec) { var s = Math.max(0, Math.round(sec)); return Math.floor(s / 60) + ":" + ("0" + (s % 60)).slice(-2); }
  function logPlay(s) {
    var head = "[Q" + state.quarter + " " + mmss(state.clock) + " " + ordinal(state.down) + "&" + state.toGo + " los" + state.los + " hx" + (state.hashX || 0) + "]";
    var line = head + " " + s;
    playLog.push(line);
    if (playLog.length > 80) playLog.shift();
    logSys({ ev: "play", text: s.replace(/<[^>]+>/g, "") });   // システムログにも追記
    if (typeof console !== "undefined" && console.log) console.log(line);
    var el = (typeof document !== "undefined") && document.getElementById && document.getElementById("playLog");
    if (el && el.style && el.style.display === "block") renderPlayLog();
  }
  // 操作（入力）をシステムログに記録する。seed＋この入力列で完全再現できる。
  function logInput(ev, val) { logSys({ ev: ev, val: val }); }
  function renderPlayLog() {
    var el = document.getElementById("playLog");
    if (!el) return;
    var rows = playLog.slice(-30).reverse().map(function (l) { return '<div class="lg-row">' + l.replace(/<[^>]+>/g, "") + '</div>'; }).join("");
    var seedTxt = (replaySeed != null) ? ("再現モードON seed=" + replaySeed) : "再現モードOFF（通常乱数）";
    var dbg = '<div class="lg-dbg">' +
      '<span>' + seedTxt + '</span>' +
      '<button class="lg-btn" id="logSeedBtn">' + (replaySeed != null ? "OFFにする" : "再現モードON（シード指定）") + '</button>' +
      '<button class="lg-btn" id="logSysBtn">システムログ(JSON)</button>' +
      '<button class="lg-btn" id="logCopyBtn">コピー</button>' +
      '</div><textarea id="logSysArea" class="lg-area" readonly style="display:none"></textarea>';
    el.innerHTML = '<div class="lg-head">ログ<button class="lg-close" id="logClose">とじる</button></div>' + dbg +
      '<div class="lg-sub">ユーザー用プレーログ（新しい順）</div>' + rows;
    var c = document.getElementById("logClose");
    if (c) c.onclick = function () { el.style.display = "none"; };
    var sb = document.getElementById("logSeedBtn");
    if (sb) sb.onclick = function () {
      if (replaySeed != null) { disableReplay(); }
      else {
        var def = String((Date.now ? 0 : 0) || 12345);
        var s = (typeof prompt !== "undefined") ? prompt("再現用のシード（整数）を入力。次の『はじめる』から決定論的に再現できます。", "12345") : "12345";
        if (s == null) return;
        enableReplay(parseInt(s, 10) || 0);
      }
      renderPlayLog();
    };
    var yb = document.getElementById("logSysBtn");
    if (yb) yb.onclick = function () {
      var ta = document.getElementById("logSysArea");
      ta.value = sysLogJSON(); ta.style.display = "block";
      if (typeof console !== "undefined" && console.log) console.log(ta.value);
    };
    var cp = document.getElementById("logCopyBtn");
    if (cp) cp.onclick = function () {
      var ta = document.getElementById("logSysArea");
      ta.value = sysLogJSON(); ta.style.display = "block"; ta.select && ta.select();
      try { if (navigator && navigator.clipboard) navigator.clipboard.writeText(ta.value); else document.execCommand && document.execCommand("copy"); } catch (e) {}
    };
  }

  function loadAutoAdvanceSetting() {
    try {
      return window.localStorage && window.localStorage.getItem("boxelAutoAdvance") === "1";
    } catch (e) {
      return false;
    }
  }

  function saveAutoAdvanceSetting(on) {
    try {
      if (window.localStorage) window.localStorage.setItem("boxelAutoAdvance", on ? "1" : "0");
    } catch (e) {}
  }

  function updateAutoAdvanceButton() {
    var btn = document.getElementById("autoAdvanceBtn");
    if (!btn) return;
    btn.textContent = "自動すすむ: " + (autoAdvanceOn ? "ON" : "OFF");
    btn.className = autoAdvanceOn ? "on" : "";
  }

  function stopAutoContinue() {
    if (autoContinueTimer) { clearTimeout(autoContinueTimer); autoContinueTimer = null; }
  }

  function startAutoContinue(tap, go) {
    stopAutoContinue();
    if (!tap || !go) return;
    var remain = 3;
    function renderCountdown() {
      tap.textContent = "▶ タップで次へ（あと" + remain + "秒）";
    }
    function tick() {
      remain--;
      if (remain <= 0) { go(); return; }
      renderCountdown();
      autoContinueTimer = setTimeout(tick, 1000);
    }
    renderCountdown();
    autoContinueTimer = setTimeout(tick, 1000);
  }

  // メッセージを読み終えるまで待ってから次へ進む。「タップで次へ」クリックで即進行、
  // 押されなくても長め(30秒)の安全フォールバックで自動進行する（ヘッドレスでは即時実行）。
  function waitContinue(fn) {
    if (continueTimer) { clearTimeout(continueTimer); continueTimer = null; }
    stopAutoContinue();
    var tap = document.getElementById("tapNext");
    var done = false;
    function go() {
      if (done) return; done = true;
      if (continueTimer) { clearTimeout(continueTimer); continueTimer = null; }
      stopAutoContinue();
      currentContinueGo = null;
      if (tap) { tap.onclick = null; tap.textContent = "▶ タップで次へ"; tap.style.display = "none"; }
      fn();
    }
    currentContinueGo = go;
    if (tap) {
      tap.textContent = "▶ タップで次へ";
      tap.style.display = "block";
      tap.onclick = go;
      if (autoAdvanceOn) startAutoContinue(tap, go);
    }
    continueTimer = setTimeout(go, 30000);
  }

  function setCards(arr) {

    arr.forEach(function (o) {
      var d = document.createElement("div"); d.className = "card";
      d.innerHTML = '<div class="ico">' + o.ico + '</div><div class="t">' + o.t + '</div><div class="d">' + o.d + '</div>';

  // 隊形フェーズで「編成を変える」ボタンを出し入れする（カード枚数に影響させない）。

  // 守備がカバレッジを選び、配置で「気配（テル）」を見せる
  function applyCoverageTell(cov) {
    var los = state.los;
    var movers = defense.filter(function (d) { return d.userData.role !== "DL"; });
    for (var i = 0; i < movers.length; i++) {
      if (cov === "blitz") movers[i].position.z = los + 2;       // 前に詰める
      else if (cov === "zone") movers[i].position.z = los + 9;   // 後ろに下がる
      else movers[i].position.z = los + 5;                       // man: 受け手の前
    }
    if (cov === "man") {
      // CB/LB を攻撃スキル選手（WR/RB/QB）の横位置に合わせて張り付く
      var skill = offense.filter(function (o) {
        var r = o.userData.role; return r === "WR" || r === "RB" || r === "QB";
      });
      for (var j = 0; j < movers.length; j++) {
        var t = skill[j % skill.length];
        if (t) movers[j].position.x = t.position.x;
      }
    }
  }
  function coverageTellText(cov) {
    if (cov === "blitz") return "前に詰めて<b>突っ込む構え（ブリッツ）</b>みたい。素早い手が効きそう。";
    if (cov === "man")   return "受け手に<b>ぴったり張り付いてる（マン）</b>。足で振り切れるかな。";
    return "後ろに<b>広がって守る構え（ゾーン）</b>。手薄なのはどこ？";
  }

  function pickFormation(f) {
    logInput("formation", f);
    showPersonnelBtn(false);   // プレー選択へ進むので編成変更ボタンは隠す
    state.formation = f; placeFormation(f); state.phase = "play";
    // 守備がこの隊形に反応してカバレッジを選び、テルを見せる（読み合い）
    state.defCoverage = window.BoxelGame.pickDefenseCoverage({ down: state.down, toGo: state.toGo });
    applyCoverageTell(state.defCoverage);
    setBubble("<b>" + f.toUpperCase() + "</b> だね！ 相手は" + coverageTellText(state.defCoverage) + " <b>プレー</b>を選ぼう。");
    var cards = [
      { ico: "🏃", t: "ラン", d: "走って前進。確実だが小さめ", fn: function () { startPlay("run"); } },
      { ico: "✋", t: "ショートパス", d: "近くへ短く。成功しやすい", fn: function () { chooseTargetUI("short"); } },
      { ico: "🎈", t: "ロングパス", d: "大きく前進。リスクも大きい", fn: function () { chooseTargetUI("long"); } }
    ];
    if (state.down === 4) {
      cards.push({ ico: "🥅", t: "フィールドゴール", d: "成功で3点。近いほど決まる", fn: function () { kickPlay("fg"); } });
      cards.push({ ico: "👟", t: "パント", d: "相手を深い位置に。攻守交代", fn: function () { kickPlay("punt"); } });
    }
    setCards(cards);
  }

  // パスプレーのターゲット（受け手）を選ぶ
  function chooseTargetUI(play) {
    state.phase = "play";
    var targets = offense.filter(function (p) {
      var r = p.userData.role; return r === "WR" || r === "TE" || r === "RB";
    });
    if (targets.length === 0) { startPlay(play); return; }
    var playLabel = play === "short" ? "ショートパス" : "ロングパス";
    setBubble("ホイッスル先生：<b>誰に投げる？</b> " + playLabel + " のターゲットを選ぼう！");
    var icoMap = { WR: "🏃", TE: "💪", RB: "⚖️" };
    setCards(targets.map(function (t) {
      var s = t.userData.stats || {};
      var catchVal = s.catch  != null ? s.catch  : 6;
      var speedVal = s.speed  != null ? s.speed  : 6;
      var stamBar  = t.userData.staminaMax ? Math.round(t.userData.stamina / t.userData.staminaMax * 10) : 10;
      return {
        ico: icoMap[t.userData.role] || "🏈",
        t:   t.userData.name || t.userData.role,
        d:   t.userData.role + " | 捕" + catchVal + " 速" + speedVal + " 体" + stamBar,
        fn:  (function (target) { return function () { startPlayWithTarget(play, target); }; })(t)
      };
    }));
  }

  // ターゲットを確定してプレーを開始する
  function startPlayWithTarget(play, target) {
    // 最寄りの CB/S をカバー担当 DB として特定
    var coverDbSpeed = defenseStat("speed");
    var dbs = defense.filter(function (d) { var r = d.userData.role; return r === "CB" || r === "S"; });
    if (dbs.length > 0) {
      var minDist = Infinity, nearest = dbs[0];
      dbs.forEach(function (db) {
        var dx = db.position.x - target.position.x, dz = db.position.z - target.position.z;
        var d2 = dx * dx + dz * dz;
        if (d2 < minDist) { minDist = d2; nearest = db; }
      });
      coverDbSpeed = (nearest.userData.stats && nearest.userData.stats.speed) || 6;
    }
    state.passTarget = target;
    state.passTargetDbSpeed = coverDbSpeed;
    startPlay(play);
  }

  // キック（フィールドゴール／パント）。FGは2タップのミニゲーム、成否はキッカーの kick 力と距離・狙い・パワーで決まる
  function kickPlay(type) {
    logInput("kick", type);
    state.phase = "animating"; setCards([]);
    var kicker = byRole("P") || bestKicker();
    var kickStat = statOf(kicker, "kick");
    var kf = kickStat / 6;
    var who = kicker.userData.name || "キッカー";
    // キック局面：専用スペシャルチームをオンフィールドに（終了時 restoreUnits で戻す）
    setActiveUnits("special");
    placeSpecialFormation(state.los, true);
    if (type === "fg") {
      setBubble("ホイッスル先生：スペシャルチーム登場！ フィールドゴールをねらうよ。");
      startFGMinigame(who, kickStat);
    } else {
      // パント: パントリターン分を差し引く
      var dpunt = rand(30, 45) * (0.8 + 0.2 * kf);
      setBubble("スペシャルチーム登場！ " + who + " がパント！ ボールが高く飛ぶ…");
      setTimeout(function () {
        var pr = window.BoxelGame.puntReturn({});
        var returnMsg = (pr.kind === "fairCatch") ? "フェアキャッチ！" : (pr.yards > 0 ? pr.yards + "ヤードリターン。" : "");
        setBubble("ホイッスル先生：相手を深い位置に押し込んだ！ " + returnMsg);
        var rawLos = Math.min(GOAL_FAR - 5, Math.round(state.los + dpunt));
        // パントリターン分だけ手前（自分側）に戻す（受球側が前に出る）
        state.los = Math.max(GOAL_NEAR + 5, rawLos - pr.yards);
        restoreUnits();
        endPossession(Math.min(0.45, (dpunt - pr.yards) / 100));
      }, 1000);
    }
  }

  // FG結果を適用してキックオフ/攻守交代へ進む（ミニゲーム・確率どちらの判定でも共通）。
  function resolveFGResult(ok, reason) {
    animateFGKick(112, ok, function () {
      fgView = false;   // カメラを通常視点へ戻す
      restoreUnits();
      if (ok) {
        state.home += 3; flashScore();
        setBubble("ホイッスル先生：<b>成功！ 3点</b>！ ナイスキック！");
        waitContinue(function () { startKickoff(false, function (losForAway) {
          state.los = losForAway; endPossession(0.1);
        }); });
      } else {
        var miss = (reason === "short") ? "ショート（届かず）" : (reason === "wideLeft") ? "左に外れた" : (reason === "wideRight") ? "右に外れた" : "外れた";
        setBubble("ホイッスル先生：<b>失敗…</b> " + miss + "！ 相手ボールへ。");
        endPossession(0);
      }
    });
  }

  // FGミニゲーム: 狙いメーター→パワーメーターを各1タップで止め、fgResolve で判定する。
  // updateFGMeter(dt) が毎フレームメーター値と画面表示を更新する。
  function _fgo(id) { return (typeof document !== "undefined") && document.getElementById(id); }
  function _showFGOverlay(title, goodL, goodW, lblLeft, lblRight, btnFn) {
    var ov = _fgo("fgOverlay"); if (!ov) return;
    var t = _fgo("fgoTitle"); if (t) t.textContent = title;
    var g = _fgo("fgoGood");
    if (g) { g.style.left = (goodL * 100).toFixed(1) + "%"; g.style.width = (goodW * 100).toFixed(1) + "%"; }
    var n = _fgo("fgoNeedle"); if (n) n.style.left = "50%";
    var l = _fgo("fgoLabels"); if (l) l.innerHTML = "<span>" + lblLeft + "</span><span>" + lblRight + "</span>";
    var b = _fgo("fgoBtn"); if (b) b.onclick = btnFn;
    // パネル（吹き出し・カード）を隠してオーバーレイだけ表示
    var p = _fgo("panel"); if (p) p.style.display = "none";
    ov.style.display = "block";
  }
  function _hideFGOverlay() {
    var ov = _fgo("fgOverlay"); if (ov) ov.style.display = "none";
    var p = _fgo("panel"); if (p) p.style.display = "";
  }
  function startFGMinigame(who, kickStat) {
    var xb = state.hashX || 0, zb = state.los;
    var dist = Math.round((GOAL_FAR - zb) + 17);
    var sw = window.BoxelGame.fgAimSwing(xb, zb);
    var win = window.BoxelGame.fgAngleWindow(xb, zb);
    var DISP = 1.3;
    var dMin = sw.center - sw.half * DISP, dRange = sw.half * 2 * DISP;
    var AIM_TOL = 0.05, POWER_BUF = 0.10;   // fgResolve と一致させる
    var neededPow = Math.max(0.05, Math.min(0.92, ((GOAL_FAR - zb) + 17) / window.BoxelGame.fgReach(kickStat) - POWER_BUF));
    fgMeter = {
      stage: "aim", t: 0, who: who, kickStat: kickStat, xb: xb, zb: zb,
      aimCenter: sw.center, aimHalf: sw.half, aim: sw.center, power: 0,
      dMin: dMin, dRange: dRange,
      goodAimL: Math.max(0, Math.min(1, (win.left  - AIM_TOL - dMin) / dRange)),
      goodAimR: Math.max(0, Math.min(1, (win.right + AIM_TOL - dMin) / dRange)),
      neededPow: neededPow
    };
    // カメラをゴールポスト正面視点に切り替え
    fgView = true; fgViewLos = zb;
    _showFGOverlay("← 狙い →  中央の緑に止めよう", fgMeter.goodAimL, fgMeter.goodAimR - fgMeter.goodAimL, "左", "右", stopFGAim);
    setCards([{ ico: "🎯", t: "狙いを止める", d: "中央で止めるほど正確", fn: stopFGAim }]);
  }
  function stopFGAim() {
    if (!fgMeter || fgMeter.stage !== "aim") return;
    fgMeter.stage = "power"; fgMeter.t = 0;
    _showFGOverlay("パワー  緑ゾーンで止めよう", fgMeter.neededPow, 1 - fgMeter.neededPow, "弱", "強", stopFGPower);
    setCards([{ ico: "💥", t: "パワーを止める", d: "強すぎても弱すぎてもダメ", fn: stopFGPower }]);
  }
  function stopFGPower() {
    if (!fgMeter || fgMeter.stage !== "power") return;
    var m = fgMeter; fgMeter = null; setCards([]);
    _hideFGOverlay();
    var res = window.BoxelGame.fgResolve({ aim: m.aim, power: m.power, xb: m.xb, zb: m.zb, kickStat: m.kickStat });
    state.phase = "animating";
    resolveFGResult(res.success, res.reason);
  }
  // メーター進行と画面更新（aim は左右に振れ、power は 0→1 を往復）。
  function updateFGMeter(dt) {
    if (!fgMeter) return;
    fgMeter.t += dt;
    var nEl = _fgo("fgoNeedle");
    if (fgMeter.stage === "aim") {
      fgMeter.aim = fgMeter.aimCenter + Math.sin(fgMeter.t * 1.8) * fgMeter.aimHalf;
      if (nEl) {
        var pct = (fgMeter.aim - fgMeter.dMin) / fgMeter.dRange;
        nEl.style.left = (Math.max(0.03, Math.min(0.97, pct)) * 100).toFixed(1) + "%";
      }
    } else if (fgMeter.stage === "power") {
      fgMeter.power = 0.5 + 0.5 * Math.sin(fgMeter.t * 2.0);
      if (nEl) nEl.style.left = (Math.max(0.03, Math.min(0.97, fgMeter.power)) * 100).toFixed(1) + "%";
    }
  }

  function flashScore() {
    var el = document.getElementById("homeS"); el.style.transform = "scale(1.5)";
    setTimeout(function () { el.style.transform = "scale(1)"; }, 500);
  }

  function updateHUD() {
    if (state.mode === "defense") {
      var ot = Math.max(0, state.oppToGo);
      document.getElementById("downdist").textContent =
        "守備中 ・ 相手 " + ordinal(state.oppDown) + " & " + ot + "（あと" + (5 - state.oppDown) + "回止めれば取り返す）";
    } else {
      var toGo = Math.max(0, state.toGo);
      var toGoal = Math.round(GOAL_FAR - state.los);     // ゴールまでのヤード
      var goalToGo = (toGo >= toGoal);                   // 到達ラインがゴール = ゴール・トゥ・ゴー
      var remain = 5 - state.down;   // 今を含めた残り挑戦回数（4ダウン制）
      var distLabel = goalToGo ? "Goal" : toGo;
      var aim = goalToGo ? ("ゴールまであと" + toGoal + "ヤード") : ("あと" + toGo + "ヤード");
      var plain = state.down >= 4 ? ("ラストチャンス！" + aim) : ("のこり" + remain + "回で" + aim);
      document.getElementById("downdist").textContent = ordinal(state.down) + " & " + distLabel + " ・ " + plain;
    }
    var yl = Math.round(state.los - GOAL_NEAR);
    var side = yl <= 50 ? "自陣" + yl : "敵陣" + (100 - yl);
    var qNum = Math.min(state.quarter, 4);   // 延長は Q4 と同じ表示（OT 表記も可）
    var qLabel = state.quarter > 4 ? "OT" : ("Q" + qNum);
    var clk = Math.max(0, Math.ceil(state.clock));
    var qMin = Math.floor(clk / 60);
    var qSec = clk % 60;
    var clockStr = qMin + ":" + (qSec < 10 ? "0" : "") + qSec;
    document.getElementById("yardline").textContent = side + "ヤード ・ " + qLabel + " " + clockStr;
    document.getElementById("homeS").textContent = state.home;
    document.getElementById("awayS").textContent = state.away;
    var toBtn = document.getElementById("timeoutBtn");
    if (toBtn) {
      toBtn.textContent = "タイムアウト " + state.timeoutsHome;
      toBtn.disabled = (state.timeoutsHome <= 0 || state.gameEnded);
    }
    updateFirstDownLine();
  }

  function setView(v) {
    view = v;
    var bs = document.querySelectorAll("#views button");
    bs.forEach(function (b) { b.classList.toggle("on", b.getAttribute("data-v") === v); });
  }

  // フィールド上の選手をクリック → 名前・役割（ポジション）・能力値を表示する
  function onPointerDown(e) {
    if (!raycaster || !camera || !renderer.domElement.getBoundingClientRect) return;
    var rect = renderer.domElement.getBoundingClientRect();
    var ndc = {
      x: ((e.clientX - rect.left) / rect.width) * 2 - 1,
      y: -((e.clientY - rect.top) / rect.height) * 2 + 1
    };
    raycaster.setFromCamera(ndc, camera);
    var active = offense.concat(defense);                 // オンフィールドの22人のみ対象
    var hits = raycaster.intersectObjects(active, true);
    if (!hits.length) { hidePlayerInfo(); return; }
    var obj = hits[0].object;
    while (obj && obj.parent && obj.parent !== scene) obj = obj.parent;  // 親をたどって選手グループへ
    if (obj && obj.userData && obj.userData.role) showPlayerInfo(obj);
    else hidePlayerInfo();
  }

  function showPlayerInfo(p) {
    var u = p.userData;
    var roleLabel = (BC.ROLES[u.role] && BC.ROLES[u.role].label) ? BC.ROLES[u.role].label : "";
    var team = (offense.indexOf(p) >= 0) ? "味方" : "相手";
    var s = u.stats || {};
    var el = document.getElementById("playerInfo");
    el.innerHTML =
      '<div class="pi-name">' + (u.name || "選手") + '<span class="pi-team">' + team + '</span></div>' +
      '<div class="pi-role"><b>' + u.role + '</b> ― ' + roleLabel + '</div>' +
      '<div class="pi-stat">スピード ' + (s.speed != null ? s.speed : 6) +
        ' ・ パワー ' + (s.power != null ? s.power : 6) +
        ' ・ 捕球 ' + (s.catch != null ? s.catch : 6) +
        ' ・ キック ' + (s.kick != null ? s.kick : 6) + '</div>' +
      '<div class="pi-hint">タップで閉じる／別の選手をタップで切替</div>';
    el.style.display = "block";
  }

  function hidePlayerInfo() {
    var el = document.getElementById("playerInfo");
    if (el) el.style.display = "none";
  }

  function easeInOutQuad(t) {
    return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  }

  function currentCameraRig() {
    // FGミニゲーム中はゴールポスト正面視点（ボール位置から前方を向く）
    if (fgView) {
      var hx = fgViewLos ? (state.hashX || 0) : 0;
      return {
        key: "fg:" + fgViewLos + ":" + hx,
        pos: new THREE.Vector3(hx, 6, fgViewLos - 8),
        target: new THREE.Vector3(0, 9, 112)
      };
    }
    var focus = (state.phase === "animating") ? ball.position : new THREE.Vector3(0, 0, state.los + 6);
    var off, look;
    if (view === "top") { off = new THREE.Vector3(0, 78, -4); look = focus; }
    else if (view === "player") { off = new THREE.Vector3(0, 7, -16); look = new THREE.Vector3(focus.x, 2, focus.z + 16); }
    else { off = new THREE.Vector3(30, 38, -32); look = focus; }
    return { key: view, pos: focus.clone().add(off), target: look };
  }

  function updateCamera(dt) {
    var rig = currentCameraRig();
    if (cameraModeKey && cameraModeKey !== rig.key) {
      cameraBlend = { t: 0, dur: 0.5, fromPos: camPos.clone(), fromTarget: camTarget.clone() };
    }
    cameraModeKey = rig.key;

    if (cameraBlend) {
      cameraBlend.t += dt;
      var bp = Math.min(1, cameraBlend.t / cameraBlend.dur);
      var e = easeInOutQuad(bp);
      camPos.copy(cameraBlend.fromPos).lerp(rig.pos, e);
      camTarget.copy(cameraBlend.fromTarget).lerp(rig.target, e);
      if (bp >= 1) cameraBlend = null;
    } else {
      var lerp2 = 1 - Math.pow(0.001, dt);
      camPos.lerp(rig.pos, lerp2);
      camTarget.lerp(rig.target, lerp2);
    }

    var renderPos = camPos.clone();
    if (cameraShake.dur > 0 && cameraShake.t < cameraShake.dur) {
      cameraShake.t += dt;
      var sk = Math.max(0, 1 - cameraShake.t / cameraShake.dur) * cameraShake.amp;
      renderPos.x += Math.sin(cameraShake.t * 95) * sk;
      renderPos.y += Math.sin(cameraShake.t * 131 + 1.7) * sk * 0.45;
      renderPos.z += Math.cos(cameraShake.t * 113) * sk;
    }
    camera.position.copy(renderPos); camera.lookAt(camTarget);
  }

  function updateAnim(dt) {
    if (!anim) return;
    anim.t += dt;
    var p = Math.min(1, anim.t / anim.dur);
    var currentCarrier = (anim.kind === "run") ? rb : wr;

    if (anim.kind === "run") {
      var z = lerp(anim.startZ, anim.endZ, p);
      carrier.position.z = z; carrier.position.y = Math.abs(Math.sin(p * 18)) * 0.25;
      poseRunLean(carrier, p * 9);
      setCarriedBall(carrier);
    } else {
      var tf = anim.throwFrac || 0.78;
      if (p < tf) {
        // 投球フェーズ: ボールは ballLand へ弧を描いて飛ぶ／受け手は wrTarget へ走る（別軌道）
        var pp = p / tf;
        var bx0 = lerp(anim.ballFrom.x, anim.ballLand.x, pp);
        var bz0 = lerp(anim.ballFrom.z, anim.ballLand.z, pp);
        var by0 = lerp(anim.ballFrom.y, anim.ballLand.y, pp) + Math.sin(pp * Math.PI) * 7;
        wr.position.x = lerp(anim.wrFromX, anim.wrTarget.x, pp);
        wr.position.z = lerp(anim.wrFromZ, anim.wrTarget.z, pp);
        wr.position.y = Math.abs(Math.sin(pp * 16)) * 0.2;
        poseRunLean(wr, pp * 8);
        setBall(bx0, bz0, by0);
        passFlightActive = true;
      } else {
        var pp2 = (p - tf) / (1 - tf);
        if (anim.o.complete) {
          // 成功: マーカー緑＋キャッチでひと跳ね→ボールを持って前進
          setMarkerColor(0x35c759);
          var fz = lerp(anim.wrTarget.z, anim.endZ, pp2);
          var catchHop = Math.max(0, 0.25 - pp2) * 2.3;      // 捕った瞬間にジャンプ（実寸キャラに合わせ控えめ）
          wr.position.z = fz; wr.position.y = Math.abs(Math.sin(pp2 * 14)) * 0.2 + catchHop;
          poseRunLean(wr, pp2 * 7);
          setCarriedBall(wr);
        } else if (anim.o.reason === "overthrow") {
          // 届かず: マーカー赤＋受け手は先へ走り抜け、ボールは手前(ballLand)で小さく弾む
          setMarkerColor(0xff3b30);
          wr.position.z = Math.min(GOAL_FAR + 8, lerp(anim.wrTarget.z, anim.wrTarget.z + 4, pp2));   // 受け手はさらに前へ（場外には出ない）
          wr.position.y = Math.abs(Math.sin(pp2 * 12)) * 0.18;
          poseRunLean(wr, pp2 * 6);
          var oy = Math.abs(Math.sin(pp2 * Math.PI * 2)) * (1 - pp2) * 1.2 + 0.3;
          setBall(anim.ballLand.x, anim.ballLand.z, oy);
        } else {
          // 落球/はたき落とし: マーカー赤＋ボールが受け手の足元(ballLand)で2回バウンド
          setMarkerColor(0xff3b30);
          var bx = anim.ballLand.x + pp2 * 1.6;
          var bz = anim.ballLand.z + pp2 * 0.8;
          var by = Math.abs(Math.sin(pp2 * Math.PI * 2)) * (1 - pp2) * 2.2 + 0.3;  // 減衰バウンド
          wr.position.y = 0; wr.rotation.x = -0.15;          // 受け手はがっくり（前傾）
          setBall(bx, bz, by);
        }
      }
    }

    // === 全選手が動く（攻撃側の役割）: OL=ブロック / QB=ドロップ・フェイク / 他WR・RB=ルート ===
    var carrierNow = currentCarrier;
    var shift = window.BoxelGame.lineClashShift(anim.olPower || 6, anim.dPower || 6, 1.5);
    offense.forEach(function (off) {
      if (off === carrierNow) return;                    // キャリアは別処理
      var orole = off.userData.role;
      if (orole === "OL" || orole === "TE") {
        // 最寄りの守備ライン(DL)に当たって押す。パワー勝ちなら前へ、負けなら後ろへ。
        var d = nearestIn(defense, off.position.x, off.position.z, "DL");
        if (d) {
          var ot = targetShortOf(
            { x: off.position.x, z: off.position.z },
            { x: d.position.x, z: d.position.z - 0.7 + shift },
            1.1,
            off.id + d.id
          );
          off.position.x += (ot.x - off.position.x) * Math.min(1, dt * 1.6);
          off.position.z += (ot.z - off.position.z) * Math.min(1, dt * 1.6);
          off.rotation.y = Math.atan2(d.position.x - off.position.x, d.position.z - off.position.z);
          off.position.y = Math.abs(Math.sin(p * 26)) * 0.05;   // 踏ん張り
          BC.poseRun(off, p * 13);
        }
      } else if (orole === "QB") {
        if (anim.kind === "pass") off.position.z = off.userData.pz0 - Math.min(p / 0.3, 1) * 6;  // ドロップバック
        else off.position.z = off.userData.pz0 - Math.min(p / 0.4, 1) * 3;                        // ラン: フェイク後に少し下がる
        poseRunLean(off, p * 8);
      } else {
        // 非ターゲットの WR/RB: 斜め前へルートを走る（デコイ）。
        // ゴール際でフィールド外へ走り抜けないよう、前進量(z)と横幅(x)をフィールド内にクランプする。
        // 奥エンドゾーン後端は z=120。手前に余裕を持たせ GOAL_FAR+8(=118) を上限にする。
        var dir = (off.userData.px0 >= 0) ? 1 : -1;
        off.position.z = Math.min(GOAL_FAR + 8, off.userData.pz0 + p * 16);
        off.position.x = Math.max(-FIELD_HALF_W, Math.min(FIELD_HALF_W, off.userData.px0 + dir * p * 6));
        off.position.y = Math.abs(Math.sin(p * 16)) * 0.18;
        off.rotation.y = Math.atan2(dir * 6, 16);
        poseRunLean(off, p * 8);
      }
    });

    // 守備の追走（役割で速度を変える）。タックル演出フェーズ中は追走を止める。
    if (anim.phase !== "tackle") {
      for (var i = 0; i < defense.length; i++) {
        var def = defense[i];
        var role = def.userData.role;
        var isTackler = (anim.tacklerIdx === i);
        // DL（ライン担当）は最寄りのOLに当たって押し合う（追走しない・タックラー時を除く）
        if (role === "DL" && !isTackler) {
          var ol = nearestIn(offense, def.position.x, def.position.z, "OL");
          if (ol) {
            var dtgt = targetShortOf(
              { x: def.position.x, z: def.position.z },
              { x: ol.position.x, z: ol.position.z + 0.7 - shift },
              1.1,
              def.id + ol.id
            );
            def.position.x += (dtgt.x - def.position.x) * Math.min(1, dt * 1.4);
            def.position.z += (dtgt.z - def.position.z) * Math.min(1, dt * 1.4);
            def.rotation.y = Math.atan2(ol.position.x - def.position.x, ol.position.z - def.position.z);
            BC.poseRun(def, p * 8);
          }
          continue;
        }
        // CB=俊足で強く追う / LB ほか=中盤で追う
        var pursuitT = dt * (role === "CB" ? 3.2 : 2.6);
        if (isTackler && p > 0.6) {
          // タックラーは終盤で強く収束
          pursuitT = dt * 6.0;
        }
        var pursueTarget = targetShortOf(
          { x: def.position.x, z: def.position.z },
          { x: carrierNow.position.x, z: carrierNow.position.z },
          1.0,
          def.id + carrierNow.id
        );
        var tgt = window.BoxelGame.pursuitTarget(
          { x: def.position.x, z: def.position.z },
          pursueTarget,
          pursuitT
        );
        def.position.x = tgt.x;
        def.position.z = tgt.z;
        // 進行方向（キャリア）へ向き直す（後ろ向きに走らない）
        def.rotation.y = Math.atan2(
          carrierNow.position.x - def.position.x,
          carrierNow.position.z - def.position.z
        );
        poseRunLean(def, p * 8);
      }
    }

    applyVisualSeparation(carrierNow);

    if (p < 1) return;

    // ===== プレー終了 → タックル/転倒の演出（位置・傾きのみ・結果ヤードは不変）=====
    // 不成功パス／インターセプトはタックルしない（従来どおり一拍おいて確定）
    var tackleable = (anim.kind === "run") || (anim.kind === "pass" && anim.o.complete);
    if (!tackleable) {
      var oInc = anim.o; anim = null; setTimeout(function () { finalize(oInc); }, 350); return;
    }

    if (anim.phase !== "tackle") {
      anim.phase = "tackle";
      anim.tackT = 0;
      anim.carrierBaseY = carrierNow.position.y;
      // ゴール到達（タッチダウン）は倒れず喜ぶ。それ以外は守備に止められて倒れる。
      anim.isTD = anim.endZ >= GOAL_FAR - 0.5;
      anim.tackled = !anim.isTD;
      if (anim.isTD) spawnConfetti(carrierNow.position.x, carrierNow.position.y + 2.8, carrierNow.position.z, 60);
      if (anim.tackled) {
        // いま実際にいちばん近い守備をタックラーにする（見た目の当たりを保証）
        anim.tacklerIdx = window.BoxelGame.nearestDefenderIndex(
          { x: carrierNow.position.x, z: carrierNow.position.z },
          defense.map(function (d) { return { x: d.position.x, z: d.position.z }; })
        );
        var tk = (anim.tacklerIdx >= 0) ? defense[anim.tacklerIdx] : null;
        if (tk) {
          anim.tkFromX = tk.position.x; anim.tkFromZ = tk.position.z; anim.tkFromY = tk.position.y;
          tk.rotation.y = Math.atan2(carrierNow.position.x - tk.position.x,
                                     carrierNow.position.z - tk.position.z);
        }
      }
    }

    var tkr = (anim.tacklerIdx >= 0) ? defense[anim.tacklerIdx] : null;
    if (anim.tackled && anim.hitStopLeft > 0) {
      anim.hitStopLeft = Math.max(0, anim.hitStopLeft - dt);
      applyVisualSeparation(carrierNow);
      return;
    }

    anim.tackT += dt;
    var tp = Math.min(1, anim.tackT / 0.6);

    if (anim.tackled) {
      // --- 倒れる演出: 守備が当たりに行き、キャリアが転倒する ---
      // 前半(〜0.35): タックラーがキャリアへ突っ込んで密着（当たり）
      var hitP = Math.min(1, tp / 0.35);
      if (!anim.hitStopDone && hitP >= 1) {
        anim.hitStopDone = true;
        anim.hitStopLeft = 0.1;
        startCameraShake(0.12, 0.15);
      }
      var baseScale = carrierNow.userData && carrierNow.userData.baseScale;
      if (baseScale) {
        var squash = Math.sin(hitP * Math.PI);
        carrierNow.scale.set(baseScale.x * (1 + squash * 0.12), baseScale.y * (1 - squash * 0.18), baseScale.z * (1 + squash * 0.12));
      }
      if (tkr) {
        tkr.position.x = lerp(anim.tkFromX, carrierNow.position.x, hitP);
        tkr.position.z = lerp(anim.tkFromZ, carrierNow.position.z - 0.9, hitP);
        tkr.position.y = anim.tkFromY + Math.sin(hitP * Math.PI) * 0.3;   // 踏み込み
      }
      // 当たり以降(0.2〜): キャリアが後ろ向きに倒れて地面に伏せる
      var fallP = Math.max(0, Math.min(1, (tp - 0.2) / 0.8));
      carrierNow.rotation.x = -1.35 * fallP;                              // あおむけに倒れる
      carrierNow.rotation.z = Math.sin(tp * Math.PI * 2) * 0.2 * (1 - fallP);
      carrierNow.position.y = anim.carrierBaseY + Math.sin(hitP * Math.PI) * 0.3 * (1 - fallP);
      if (tkr) tkr.rotation.x = -0.5 * fallP;                            // のしかかる
      setCarriedBall(carrierNow, Math.max(0.75, 1.0 - fallP * 0.25));
    } else {
      // --- 倒れない演出: タッチダウンで喜ぶ（小さくジャンプ・倒れない）---
      var hop = Math.abs(Math.sin(tp * Math.PI * 2)) * (1 - tp);
      carrierNow.position.y = anim.carrierBaseY + hop * 0.7;
      BC.poseCheer(carrierNow, tp);
      setCarriedBall(carrierNow);
    }

    applyVisualSeparation(carrierNow);

    if (tp >= 1) { var oFin = anim.o; offense.forEach(function (p0) { BC.poseReset(p0); }); defense.forEach(function (p1) { BC.poseReset(p1); }); anim = null; finalize(oFin); }
  }

  function updateTrail() {
    trailPts.push(ball.position.clone());
    if (trailPts.length > 50) trailPts.shift();
    var pos = trail.geometry.attributes.position.array;
    for (var i = 0; i < 50; i++) {
      var pt = trailPts[i] || trailPts[0] || ball.position;
      pos[i * 3] = pt.x; pos[i * 3 + 1] = pt.y; pos[i * 3 + 2] = pt.z;
    }
    trail.geometry.attributes.position.needsUpdate = true;
    trail.geometry.setDrawRange(0, trailPts.length);
  }

  function init() {
    scene = new THREE.Scene();
    scene.background = linearColor(0xbfe3f2);
    scene.fog = new THREE.Fog(0xbfe3f2, 80, 200);

    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), antialias: true, logarithmicDepthBuffer: true });
    renderer.outputEncoding = THREE.sRGBEncoding;

    if (!renderer.shadowMap) renderer.shadowMap = {};
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
    renderer.setSize(window.innerWidth, window.innerHeight);

    // 選手クリックで役割表示（ヘッドレスは THREE.Raycaster / addEventListener 非対応のためガード）
