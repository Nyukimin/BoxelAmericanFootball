<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ボクセル・フットボール（試作）</title>
<style>
  :root {
    --fs-title: 34px; --fs-lead: 15px; --fs-big: 17px;
    --fs-hud-num: 22px; --fs-hud-sub: 13px; --fs-score-label: 14px;
    --fs-btn: 12px; --fs-bubble: 15px; --fs-tap: 14px;
    --fs-card-t: 15px; --fs-card-d: 11px; --ico-card: 28px;
  }
  @media (max-width: 899px) {
    :root {
      --fs-title: 29px; --fs-lead: 13px; --fs-big: 15px;
      --fs-hud-num: 19px; --fs-hud-sub: 11px; --fs-score-label: 12px;
      --fs-btn: 11px; --fs-bubble: 13px; --fs-tap: 12px;
      --fs-card-t: 13px; --fs-card-d: 10px; --ico-card: 24px;
    }
  }
  @media (max-width: 559px), (max-height: 500px) {
    :root {
      --fs-title: 24px; --fs-lead: 11px; --fs-big: 13px;
      --fs-hud-num: 16px; --fs-hud-sub: 10px; --fs-score-label: 10px;
      --fs-btn: 10px; --fs-bubble: 11px; --fs-tap: 11px;
      --fs-card-t: 11px; --fs-card-d: 9px; --ico-card: 20px;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #bfe3f2; font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif; }
  #c { display: block; width: 100%; height: 100%; }
  .hud { position: absolute; color: #fff; user-select: none; pointer-events: none; }
  #info { top: 14px; left: 14px; }
  .pill { background: rgba(36,48,24,.82); border-radius: 12px; padding: 8px 14px; display: inline-block; }
  #downdist { font-size: var(--fs-hud-num); font-weight: 700; }
  #yardline { font-size: var(--fs-hud-sub); opacity: .85; margin-top: 2px; }
  #score { top: 14px; left: 50%; transform: translateX(-50%); }
  #score .sb { background: rgba(36,48,24,.82); border-radius: 12px; padding: 8px 18px; display: flex; align-items: center; gap: 12px; font-size: var(--fs-score-label); }
  #score .n { font-size: var(--fs-hud-num); font-weight: 700; font-variant-numeric: tabular-nums; }
  .home { color: #ffd166; } .away { color: #fff; }
  #views { top: 14px; right: 14px; display: flex; gap: 6px; pointer-events: auto; }
  #views button { background: rgba(36,48,24,.7); color: #fff; border: 1px solid rgba(255,255,255,.3); border-radius: 9px; padding: 7px 10px; font-size: var(--fs-btn); cursor: pointer; font-family: inherit; }
  #views button.on { background: #ee8e3c; border-color: #ee8e3c; }
  #panel { bottom: 18px; left: 16px; width: min(480px, calc(100vw - 32px)); max-width: 480px; text-align: left; pointer-events: auto; }
  .bubble { background: #fff; color: #2f5d2f; border-radius: 16px; padding: 10px 16px; font-size: var(--fs-bubble); line-height: 1.5; display: inline-block; max-width: 480px; box-shadow: 0 4px 0 rgba(0,0,0,.08); margin-bottom: 12px; }
  .bubble b { color: #d9622b; }
  .cards { display: flex; gap: 10px; justify-content: flex-start; flex-wrap: wrap; }
  .card { background: #fff; border-radius: 14px; padding: 12px 10px; width: 124px; cursor: pointer; border: 3px solid transparent; transition: transform .08s, border-color .12s; box-shadow: 0 4px 0 rgba(0,0,0,.1); }
  .card:hover { transform: translateY(-3px); border-color: #ffd166; }
  .card .ico { font-size: var(--ico-card); }
  .card .t { font-size: var(--fs-card-t); font-weight: 700; color: #2f4d22; margin-top: 2px; }
  .card .d { font-size: var(--fs-card-d); color: #6b7d59; margin-top: 3px; line-height: 1.35; }
  .big { display: inline-block; background: #ee8e3c; color: #fff; border: none; border-radius: 14px; padding: 13px 28px; font-size: var(--fs-big); font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 4px 0 #b9651f; }
  .big:active { transform: translateY(2px); box-shadow: 0 2px 0 #b9651f; }
  #start { position: absolute; inset: 0; background: #bfe3f2; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
  #start h1 { font-size: var(--fs-title); color: #2f6b3c; } #start p { color: #5a6b4a; margin: 8px 0 22px; font-size: var(--fs-lead); }
  #start .ball { font-size: 64px; }
  #start.demo { background: linear-gradient(180deg, rgba(10,15,8,.66), rgba(10,15,8,.40) 36%, rgba(10,15,8,.40) 64%, rgba(10,15,8,.66)); }
  #start.demo h1 { color: #ffffff; text-shadow: 0 2px 10px rgba(0,0,0,.55); }
  #start.demo p { color: #eef7e3; text-shadow: 0 1px 6px rgba(0,0,0,.55); }
  #demoBadge { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 11; display: none; background: rgba(10,15,8,.62); color: #fff; letter-spacing: .22em; font-size: 12px; font-weight: 700; padding: 6px 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,.45); pointer-events: none; }
  body.demo-active #demoBadge { display: block; }
  body.demo-active #info, body.demo-active #score, body.demo-active #views, body.demo-active #helpWrap, body.demo-active #timeoutWrap, body.demo-active #playerInfo, body.demo-active #playLog { display: none !important; }
  body.demo-active #panel { display: block; z-index: 11; pointer-events: none; }
  body.demo-active #tapNext, body.demo-active #cards, body.demo-active #personnelBtn { display: none !important; }
  .hint { font-size: 12px; opacity: .75; }
  #tapNext { display: none; margin-top: 8px; text-align: center; font-size: var(--fs-tap); font-weight: 700; color: #2f4d22; background: #ffe9b8; border: 2px solid #ffd166; border-radius: 10px; padding: 9px; cursor: pointer; animation: tapPulse 1s ease-in-out infinite; }
  #personnelBtn { display: none; margin-top: 8px; text-align: center; font-size: 13px; font-weight: 700; color: #234; background: #dfeefc; border: 2px solid #8fbce6; border-radius: 10px; padding: 8px; cursor: pointer; }
  @media (max-width: 559px) {
    #panel { width: calc(100vw - 32px); max-width: none; }
    .bubble { max-width: 100%; }
  }
  @keyframes tapPulse { 0%, 100% { opacity: .6; } 50% { opacity: 1; } }
  #helpWrap { top: 52px; right: 14px; pointer-events: auto; display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 6px; max-width: calc(100vw - 28px); }
  #helpBtn, #guideBtn, #logBtn, #autoAdvanceBtn { background: rgba(36,48,24,.7); color: #fff; border: 1px solid rgba(255,255,255,.3); border-radius: 9px; padding: 7px 11px; font-size: var(--fs-btn); cursor: pointer; font-family: inherit; }
  #autoAdvanceBtn.on { background: #ee8e3c; border-color: #ee8e3c; }
  #playLog { position: absolute; top: 92px; right: 14px; z-index: 18; display: none; pointer-events: auto; background: rgba(20,30,16,.94); color: #d9f0c8; border-radius: 10px; padding: 10px 12px; width: min(380px, 92vw); max-height: 60vh; overflow-y: auto; font-size: 11px; line-height: 1.5; font-family: ui-monospace, monospace; }
  #playLog .lg-head { display: flex; justify-content: space-between; align-items: center; color: #fff; font-weight: 700; margin-bottom: 6px; font-family: inherit; }
  #playLog .lg-close { background: #ee8e3c; color: #fff; border: none; border-radius: 8px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: inherit; }
  #playLog .lg-row { border-bottom: 1px solid rgba(255,255,255,.08); padding: 2px 0; }
  #playLog .lg-dbg { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; background: rgba(255,255,255,.06); border-radius: 8px; padding: 6px; margin-bottom: 6px; color: #ffd9a0; }
  #playLog .lg-btn { background: #3a5a2a; color: #fff; border: 1px solid rgba(255,255,255,.25); border-radius: 7px; padding: 4px 8px; font-size: 10px; cursor: pointer; font-family: inherit; }
  #playLog .lg-area { width: 100%; height: 120px; margin: 6px 0; font-size: 10px; font-family: ui-monospace, monospace; background: #0c1209; color: #b8e0a0; border: 1px solid rgba(255,255,255,.15); border-radius: 6px; }
  #playLog .lg-sub { color: #fff; font-weight: 700; margin: 6px 0 4px; }
  #timeoutWrap { top: 92px; right: 14px; pointer-events: auto; }
  #timeoutBtn { background: rgba(36,48,24,.7); color: #fff; border: 1px solid rgba(255,255,255,.3); border-radius: 9px; padding: 7px 11px; font-size: var(--fs-btn); cursor: pointer; font-family: inherit; }
  #timeoutBtn:disabled { opacity: .45; cursor: default; }
  #help { position: absolute; inset: 0; background: rgba(20,30,16,.92); z-index: 20; display: none; overflow-y: auto; pointer-events: auto; padding: 24px 14px 40px; }
  #help .sheet { background: #fff; color: #2f4d22; max-width: 920px; margin: 0 auto; border-radius: 16px; padding: 18px; line-height: 1.65; }
  #help .viewer-img { display: block; width: 100%; max-width: 100%; height: auto; border-radius: 14px; background: #f0f7e6; }
  #help h2 { color: #2f6b3c; font-size: 24px; margin: 16px 0 8px; }
  #help .caption { color: #2f4d22; font-size: 15px; }
  #help b { color: #d9622b; }
  #help .viewer-nav { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
  #help .nav-btn, #help .close { background: #ee8e3c; color: #fff; border: none; border-radius: 12px; padding: 10px 18px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  #help .nav-btn:disabled { opacity: .35; cursor: default; }
  #help .page-count { color: #2f4d22; font-size: 14px; font-weight: 700; min-width: 64px; text-align: center; font-variant-numeric: tabular-nums; }
  #help .close { display: block; margin: 16px auto 0; padding: 11px 28px; font-size: 15px; }
  @media (max-width: 559px) {
    #help { padding: 14px 10px 28px; }
    #help .sheet { padding: 14px; border-radius: 14px; }
    #help h2 { font-size: 21px; }
    #help .caption { font-size: 14px; }
    #help .nav-btn, #help .close { padding: 10px 14px; }
  }
  #playerInfo { position: absolute; top: 92px; left: 14px; z-index: 8; display: none; pointer-events: auto; background: rgba(36,48,24,.92); color: #fff; border-radius: 12px; padding: 10px 14px; max-width: 290px; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,.15); }
  #playerInfo .pi-name { font-size: 16px; font-weight: 700; }
  #playerInfo .pi-team { font-size: 11px; background: rgba(255,255,255,.22); border-radius: 6px; padding: 1px 6px; margin-left: 5px; vertical-align: middle; }
  #playerInfo .pi-role { font-size: 13px; margin-top: 3px; line-height: 1.45; }
  #playerInfo .pi-role b { color: #ffd166; }
  #playerInfo .pi-stat { font-size: 12px; opacity: .85; margin-top: 5px; }
  #playerInfo .pi-hint { font-size: 10px; opacity: .55; margin-top: 5px; }
  #fgOverlay { display: none; position: absolute; left: 50%; bottom: 18px; transform: translateX(-50%); width: min(400px, 90vw); background: rgba(18,28,14,.88); border-radius: 16px; padding: 14px 18px 16px; pointer-events: auto; }
  #fgOverlay .fgo-title { font-size: 14px; font-weight: 700; color: #ffe9b8; margin-bottom: 10px; text-align: center; }
  #fgOverlay .fgo-track { position: relative; height: 32px; background: rgba(255,255,255,.12); border-radius: 16px; overflow: hidden; }
  #fgOverlay .fgo-good { position: absolute; top: 0; height: 100%; background: rgba(53,199,89,.55); }
  #fgOverlay .fgo-needle { position: absolute; top: 0; width: 8px; height: 100%; background: #ff3b30; border-radius: 4px; margin-left: -4px; box-shadow: 0 0 6px rgba(255,59,48,.6); }
  #fgOverlay .fgo-labels { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,.55); margin-top: 5px; }
  #fgOverlay .fgo-btn { display: block; width: 100%; margin-top: 12px; background: #ee8e3c; color: #fff; border: none; border-radius: 12px; padding: 12px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 4px 0 #b9651f; }
  #fgOverlay .fgo-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b9651f; }
  @media (max-width: 559px) {
    /* 1段目: ダウン表示(左) と スコア(右) */
    #info { top: 6px; left: 6px; max-width: 54vw; }
    #downdist { line-height: 1.25; }
    #yardline { margin-top: 1px; }
    .pill { padding: 5px 9px; }
    #score { top: 6px; left: auto; right: 6px; transform: none; }
    #score .sb { padding: 5px 8px; gap: 6px; }

    /* 2段目: タイムアウト(左) と ビュー切替(右) */
    #timeoutWrap { top: 76px; left: 6px; right: auto; }
    #timeoutBtn { padding: 4px 7px; }
    #views { top: 76px; right: 6px; gap: 4px; }
    #views button { padding: 4px 7px; }

    /* 3段目: ヘルプ系ボタン（右寄せ・小さく1段に収める） */
    #helpWrap { top: 110px; right: 6px; gap: 4px; max-width: calc(100vw - 12px); }
    #helpBtn, #guideBtn, #logBtn, #autoAdvanceBtn { padding: 4px 7px; }

    /* 開閉パネルはインジケータ帯の下へ */
    #playerInfo { top: 140px; left: 6px; }
    #playLog { top: 140px; right: 6px; }
  }
  @media (max-height: 500px) {
    /* 上部HUDを小型化して #info と #score の重なりを防ぐ */
    #info { top: 8px; left: 8px; }
    #yardline { margin-top: 1px; }
    .pill { padding: 4px 9px; }
    #score { top: 8px; }
    #score .sb { padding: 4px 10px; gap: 8px; }
    #views { top: 8px; right: 8px; gap: 5px; }
    #views button { padding: 5px 8px; }
    #helpWrap { top: 40px; right: 8px; }
    #helpBtn, #guideBtn, #logBtn, #autoAdvanceBtn { padding: 5px 8px; }
    #timeoutWrap { top: 72px; right: 8px; }
    #timeoutBtn { padding: 5px 8px; }
    #playerInfo { top: 72px; left: 8px; }
    #playLog { top: 72px; right: 8px; }

    /* 下部パネルをコンパクト化し、カードは横スクロールで縦あふれを回避 */
    #panel { bottom: 8px; left: 8px; width: calc(100vw - 16px); max-width: none; }
    .bubble { padding: 6px 11px; margin-bottom: 8px; }
    .cards { flex-wrap: nowrap; overflow-x: auto; gap: 8px; padding-bottom: 4px; }
    .card { width: 104px; flex: 0 0 auto; padding: 8px; }
    .card .t { margin-top: 1px; }
    .card .d { margin-top: 2px; }
    #tapNext, #personnelBtn { padding: 7px; margin-top: 6px; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="start">
  <div class="ball">🏈</div>
  <h1>ボクセル・フットボール</h1>
  <p>監督として作戦を選ぼう。4回のチャンスで10ヤード進めばOK！</p>
  <button class="big" id="startBtn">はじめる</button>
</div>

<div class="hud" id="info"><div class="pill"><div id="downdist">1st &amp; 10</div><div id="yardline">自陣30ヤード</div></div></div>
<div class="hud" id="score"><div class="sb"><span>うちのチーム</span><span class="n home" id="homeS">0</span><span style="opacity:.5">—</span><span class="n away" id="awayS">0</span><span>あいて</span></div></div>
<div id="demoBadge">DEMO</div>
<div class="hud" id="views">
  <button data-v="quarter" class="on">俯瞰</button>
  <button data-v="top">真上</button>
  <button data-v="player">選手視点</button>
</div>
<div class="hud" id="helpWrap"><button id="helpBtn">？ アメフトのルール</button><button id="guideBtn">？ ゲームのすすめ方</button><button id="logBtn">ログ</button><button id="autoAdvanceBtn">自動すすむ: OFF</button></div>
<div id="playLog"></div>
<div class="hud" id="timeoutWrap"><button id="timeoutBtn">タイムアウト 3</button></div>
<div id="playerInfo"></div>

<div id="help">
  <div class="sheet">
    <img class="viewer-img" id="helpImage" src="" alt="">
    <h2 id="helpTitle"></h2>
    <p class="caption" id="helpCaption"></p>
    <div class="viewer-nav">
      <button class="nav-btn" id="helpPrev" type="button">◀ まえ</button>
      <div class="page-count" id="helpPage"></div>
      <button class="nav-btn" id="helpNext" type="button">つぎ ▶</button>
    </div>
    <button class="close" id="helpClose" type="button">とじる</button>
  </div>
</div>

<div id="fgOverlay">
  <div class="fgo-title" id="fgoTitle"></div>
  <div class="fgo-track">
    <div class="fgo-good" id="fgoGood"></div>
    <div class="fgo-needle" id="fgoNeedle"></div>
  </div>
  <div class="fgo-labels" id="fgoLabels"></div>
  <button class="fgo-btn" id="fgoBtn">決定</button>
</div>

<div class="hud" id="panel">
  <div class="bubble" id="bubble">ホイッスル先生：まずは隊形を選んでね！</div>
  <div id="tapNext">▶ タップで次へ</div>
  <div id="personnelBtn">↺ 編成を変える</div>
  <div class="cards" id="cards"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="characters.js"></script>
<script src="gamelogic.js"></script>
<script>
(function () {
  "use strict";
  var BC = window.BoxelChars;

  var scene, camera, renderer, raycaster = null;
  var ball, ballMarker, trail, trailPts = [], manager = null, firstDownLine = null, voxelClouds = [];
  var confettiParts = [], goalPostMats = { near: null, far: null }, goalPostPulse = 0;
  var passFlightActive = false, passSpiralSpin = 0;
  var offense = [], defense = [], carrier = null, qb = null, rb = null, wr = null;
  // 6ユニット: home攻撃 / home守備 / away攻撃 / away守備 / home特殊 / away特殊
  var homeOff = [], homeDef = [], awayOff = [], awayDef = [], homeSpec = [], awaySpec = [];
  var prevUnitMode = "offense";   // special から戻る先（"offense"/"defense"）を覚えておく
  var currentUnitMode = null;
  var clock;

  var GOAL_NEAR = 10, GOAL_FAR = 110, MAX_DRIVES = 6;
  var QUARTER_LENGTH = 240;  // クォーターあたりの秒数
  var TWO_MIN_WARN = 30;     // 2分警告のしきい値（秒）
  var state = {
    los: 40, toGo: 10, down: 1, home: 0, away: 0, drive: 0,
    phase: "formation", formation: null, play: null, taped: null,
    mode: "offense", cpuStyle: null, defLos: 40, defPin: 0,
    oppLos: 40, oppDown: 1, oppToGo: 10, defFront: "balanced",
    personnel: "balanced",
    quarter: 1, clock: 240, timeoutsHome: 3, timeoutsAway: 3, twoMinWarned: false,
    clockStopped: false, gameEnded: false,
    hashX: 0,                  // ボールの横位置（ハッシュ）。-6=左 / 0=中央 / +6=右
    fwdPassUsed: false         // この1ダウンで前方パスを既に使ったか（イリーガル判定用）
  };
  var FIELD_HALF_W = 27;       // フィールド片側幅（クランプ用）
  var hintsShown = {};
  var pendingTape = null, tapeCooldown = 2;
  var anim = null;
  var defAnim = null;
  var HELP_TOPICS = [
    {
      img: "help/01-field.jpg",
      title: "フィールドを知ろう",
      caption: "アメリカンフットボールは、たての長さ<b>100ヤード</b>の緑のフィールドで戦うよ。両はしの色のついた場所が「<b>エンドゾーン</b>」。ここにボールを持ちこむと得点だ。りょうがわには高い「<b>ゴールポスト</b>」が立っていて、キックでボールを通すと点が入る。フィールドには5ヤードごとに白い線が引かれていて、いまどこまで進んだかがわかるよ。"
    },
    {
      img: "help/02-offense.jpg",
      title: "オフェンス（こうげき）ってなに？",
      caption: "ボールを持っているチームが「<b>オフェンス（攻撃）</b>」。前にボールを進めて、相手のエンドゾーンを目指すよ。走ってすすむ「<b>ラン</b>」と、投げてすすむ「<b>パス</b>」の2つが基本。仲間の「<b>ブロッカー</b>」が相手をふせいで、ボールを持つ選手の道をつくる。4回のチャンス（<b>ダウン</b>）で10ヤード進めば、また新しい4回がもらえるんだ。"
    },
    {
      img: "help/03-defense.jpg",
      title: "ディフェンス（しゅび）ってなに？",
      caption: "ボールを持っていないチームが「<b>ディフェンス（守備）</b>」。相手が前に進むのをジャマして、止めるのが仕事だよ。ボールを持つ選手にタッチして「<b>タックル</b>」で止めたり、パスをはじいたり、うばったり（<b>インターセプト</b>）する。相手を10ヤード進ませずに4回止めれば、こんどは自分たちがボールをもらえる。こうげきは点を取る役、しゅびは取らせない役なんだ。"
    },
    {
      img: "help/04-down.jpg",
      title: "4ダウンで10ヤード",
      caption: "オフェンスには、前に進むための<b>4回のチャンス</b>があるよ。これを「<b>ダウン</b>」というんだ。4回の合計で<b>10ヤード</b>進めたら大成功！　また新しい4回のチャンス（<b>ファーストダウン</b>）がもらえて、どんどん前へ進めるよ。フィールドの光る線が「あと10ヤード」の目印だ。"
    },
    {

      for (var i = 0; i < material.length; i++) {
        if (isLambertMaterial(material[i])) return true;
      }
      return false;
    }
    return material && THREE.MeshLambertMaterial && material instanceof THREE.MeshLambertMaterial;
  }

  function fixSRGBMaterialColor(material, force) {
    if (!material) return;
    if (material.length != null && typeof material !== "string") {
      for (var i = 0; i < material.length; i++) fixSRGBMaterialColor(material[i], force);
      return;
    }
    if (!material.color || !material.color.convertSRGBToLinear) return;
    if (!material.userData) material.userData = {};
    if (!force && material.userData.srgbFixed) return;
    material.color.convertSRGBToLinear();
    material.userData.srgbFixed = true;
  }

  function prepModel(root) {
    traverseObject(root, function (obj) {
      if (!obj || !obj.material) return;
      if (isLambertMaterial(obj.material)) obj.castShadow = true;
      fixSRGBMaterialColor(obj.material, false);
    });
    return root;
  }

  function prepSceneryModel(root) {
    prepModel(root);
    traverseObject(root, function (obj) {
      if (!obj || !obj.material) return;
      obj.castShadow = false;
      obj.receiveShadow = false;
    });
    return root;
  }

  function linearColor(hex) {
    var color = new THREE.Color(hex);
    if (color.convertSRGBToLinear) color.convertSRGBToLinear();
    return color;
  }

  // 到達ラインを現在の状況（攻撃=los+toGo / 守備=相手のoppLos-oppToGo）に合わせて配置

    var z = (state.mode === "defense")
      ? Math.max(GOAL_NEAR, state.oppLos - state.oppToGo)

  }

  function canDrawCanvasTexture() {
    return THREE.PlaneGeometry && THREE.CanvasTexture &&
      typeof document !== "undefined" && document.createElement &&
      document.createElement("canvas").getContext;
  }

  function makeCanvasTexture(w, h, draw) {
    var canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    var ctx = canvas.getContext("2d");
    draw(ctx, w, h);
    var tex = new THREE.CanvasTexture(canvas);
    tex.encoding = THREE.sRGBEncoding;
    tex.needsUpdate = true;
    return tex;
  }

  function makeCrowdTexture(seed) {
    if (!canDrawCanvasTexture()) return null;
    var seatBacks = ["#6f8fb5", "#879bb8", "#9aa3ad", "#8fa7b6", "#a4a8ad"];
    var shirts = ["#ff8fa3", "#ffd166", "#7ee6a7", "#75d7ff", "#c9a7ff", "#ffb36b", "#f7f7f2", "#80c8ff", "#ff9f9a"];
    var heads = ["#f1c7a8", "#d7a279", "#9b6a4d", "#f0d1b2", "#4a352f"];
    var tex = makeCanvasTexture(128, 16, function (ctx, w, h) {
      ctx.fillStyle = seatBacks[seed % seatBacks.length];
      ctx.fillRect(0, 0, w, h);
      for (var x = 1 + (seed % 4); x < w - 11; x += 12) {
        var r = (x * 31 + seed * 17) % 10;
        if (r >= 8) continue;
        var y = 2 + ((x + seed) % 2);
        ctx.fillStyle = heads[(x + seed) % heads.length];
        ctx.fillRect(x + 3, y, 4, 3);
        ctx.fillStyle = shirts[(x * 7 + seed * 5) % shirts.length];
        ctx.fillRect(x + 1, y + 3, 8, 8);
        ctx.fillRect(x, y + 6, 10, 4);
      }
    });
    if (THREE.RepeatWrapping) {
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
    }
    if (THREE.NearestFilter) {
      tex.magFilter = THREE.NearestFilter;
      tex.minFilter = THREE.NearestFilter;
    }
    return tex;
  }

  function makeStadiumEnvironment() {
    var g = new THREE.Group();
    var fieldLen = 130;
    var fieldWid = 56;
    var rise = 0.9;
    var tread = 1.6;
    var sideRows = 7;
    var endRows = 4;
    var concreteMat = new THREE.MeshLambertMaterial({ color: 0xa89f94 });
    var seatMat = new THREE.MeshLambertMaterial({ color: 0xb9bfc6 });
    var wallMat = new THREE.MeshLambertMaterial({ color: 0xf4f4f2 });
    var homeLineMat = new THREE.MeshLambertMaterial({ color: 0x2f73c8 });
    var awayLineMat = new THREE.MeshLambertMaterial({ color: 0x3f7fd0 });
    var apron = new THREE.Mesh(
      new THREE.BoxGeometry(fieldWid + 140, 0.1, 120 + 150),
      new THREE.MeshLambertMaterial({ color: 0x3f7e3f })
    );
    apron.position.set(0, -0.1, 60);
    apron.castShadow = false;
    apron.receiveShadow = false;
    g.add(apron);

    function crowdMaterial(faceWorldLength, faceWorldHeight, seed) {
      var crowdTex = makeCrowdTexture(seed);
      var mat = new THREE.MeshLambertMaterial({
        color: 0xffffff,
        map: crowdTex || null
      });
      if (mat.map) {
        if (THREE.RepeatWrapping) {
          mat.map.wrapS = THREE.RepeatWrapping;
          mat.map.wrapT = THREE.RepeatWrapping;
        }
        if (mat.map.repeat && mat.map.repeat.set) mat.map.repeat.set(Math.max(1, faceWorldLength / 12), Math.max(1, faceWorldHeight / 0.9));
        mat.map.needsUpdate = true;
      }
      return mat;
    }

    function stepMaterials(crowdFace, faceLen, faceH, seed) {
      var crowd = crowdMaterial(faceLen, faceH, seed);
      var mats = [concreteMat, concreteMat, seatMat, concreteMat, concreteMat, concreteMat];
      mats[crowdFace] = crowd;
      return mats;
    }

    function addBox(w, h, d, x, y, z, mat) {
      var m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      m.position.set(x, y, z);
      m.castShadow = false;
      m.receiveShadow = false;
      g.add(m);
      return m;
    }

    function addStep(w, h, d, x, y, z, crowdFace, faceLen, seed) {
      var m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), stepMaterials(crowdFace, faceLen, h, seed));
      m.position.set(x, y, z);
      m.castShadow = false;
      m.receiveShadow = false;
      g.add(m);
      return m;
    }

    function addSideStand(side, lineMat, seedBase) {
      var innerX = side * 43.5;
      var outward = side;
      addBox(0.7, 1.35, fieldLen, innerX + outward * 0.85, 0.675, 60, concreteMat);
      addBox(0.45, 1.4, fieldLen, innerX - outward * 0.25, 0.7, 60, wallMat);
      addBox(0.13, 0.2, fieldLen, innerX - outward * 0.5, 0.98, 60, lineMat);
      for (var i = 0; i < sideRows; i++) {
        var x = innerX + outward * (tread * (i + 0.5));
        var y = 1.2 + i * rise + rise / 2;
        addStep(tread, rise, fieldLen, x, y, 60, side < 0 ? 0 : 1, fieldLen, seedBase + i * 11);
      }
    }

    function addEndStand(side, lineMat, seedBase) {
      var innerZ = side < 0 ? -22 : 142;
      var outward = side;
      var width = fieldWid + 14;
      addBox(width, 1.2, 0.7, 0, 0.6, innerZ + outward * 0.85, concreteMat);
      addBox(width, 1.4, 0.45, 0, 0.7, innerZ - outward * 0.25, wallMat);
      addBox(width, 0.2, 0.13, 0, 0.98, innerZ - outward * 0.5, lineMat);
      for (var i = 0; i < endRows; i++) {
        var z = innerZ + outward * (tread * (i + 0.5));
        var y = 1.2 + i * rise + rise / 2;
        addStep(width, rise, tread, 0, y, z, side < 0 ? 5 : 4, width, seedBase + i * 13);
      }
    }

    addSideStand(-1, awayLineMat, 5);
    addSideStand(1, homeLineMat, 105);
    addEndStand(-1, awayLineMat, 205);
    addEndStand(1, homeLineMat, 305);
    return prepSceneryModel(g);
  }

  function makeVoxelCloud(x, y, z, s) {
    var g = new THREE.Group();
    var mat = new THREE.MeshLambertMaterial({ color: 0xffffff });
    var parts = [
      { x: 0, y: 0, z: 0, w: 8, h: 3, d: 4 },
      { x: -4.5, y: -0.2, z: 0.3, w: 5, h: 2.4, d: 3.2 },
      { x: 4.8, y: -0.1, z: -0.2, w: 5.2, h: 2.2, d: 3.4 }
    ];
    for (var i = 0; i < parts.length; i++) {
      var p = parts[i];
      var m = new THREE.Mesh(new THREE.BoxGeometry(p.w * s, p.h * s, p.d * s), mat);
      m.position.set(p.x * s, p.y * s, p.z * s);
      g.add(m);
    }
    g.position.set(x, y, z);
    g.userData = { drift: 0.12 + (Math.abs(x) % 5) * 0.015, startX: x };

  function makeConfettiGeometry() {
    if (THREE.PlaneGeometry) return new THREE.PlaneGeometry(0.3, 0.3);

  function spawnConfetti(x, y, z, count) {
    if (!scene || !THREE.MeshBasicMaterial) return;
    var colors = [0xff9fb2, 0xffe38a, 0xa8e6cf, 0x9fd8ff, 0xc8b6ff, 0xffffff];
    for (var i = 0; i < count; i++) {
      var mat = new THREE.MeshBasicMaterial({
        color: colors[i % colors.length],
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 1
      });
      var mesh = new THREE.Mesh(makeConfettiGeometry(), mat);
      mesh.position.set(x + (Math.random() - 0.5) * 3.0, y + Math.random() * 1.1, z + (Math.random() - 0.5) * 3.0);
      mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
      mesh.userData.confetti = {
        age: 0,
        life: 1.5,
        vx: (Math.random() - 0.5) * 4.0,
        vy: 4.2 + Math.random() * 3.0,
        vz: (Math.random() - 0.5) * 4.0,
        rx: (Math.random() - 0.5) * 9.0,
        ry: (Math.random() - 0.5) * 9.0,
        rz: (Math.random() - 0.5) * 9.0
      };
      scene.add(mesh);
      confettiParts.push(mesh);
    }
  }

  function updateConfetti(dt) {
    for (var i = confettiParts.length - 1; i >= 0; i--) {
      var mesh = confettiParts[i], c = mesh.userData.confetti;
      c.age += dt;
      var p = Math.min(1, c.age / c.life);
      c.vy -= 7.5 * dt;
      mesh.position.x += c.vx * dt + Math.sin(c.age * 14 + i) * 0.18 * dt;
      mesh.position.y += c.vy * dt;
      mesh.position.z += c.vz * dt + Math.cos(c.age * 12 + i) * 0.18 * dt;
      mesh.rotation.x += c.rx * dt;
      mesh.rotation.y += c.ry * dt;
      mesh.rotation.z += c.rz * dt;
      if (mesh.material) mesh.material.opacity = Math.max(0, 1 - p);
      if (p >= 1) {
        if (scene && scene.remove) scene.remove(mesh);
        confettiParts.splice(i, 1);
      }
    }
  }
