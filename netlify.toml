# Netlify 設定ファイル
# 静的サイト（リポジトリ直下の index.html 1枚）をそのまま公開する。
# ビルド工程はないため build コマンドは指定しない。

[build]
  # 公開ディレクトリ（リポジトリのルート）
  publish = "."

# netlify dev でローカル起動するときの設定
[dev]
  # 静的ファイルを配信するディレクトリ
  publish = "."
  # アクセスポート（http://localhost:8888）
  port = 8888

# docs/ 配下（企画書など）を公開URLから見えないようにする。
# force = true で実ファイルより優先し、常に 404 を返す。
[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true
